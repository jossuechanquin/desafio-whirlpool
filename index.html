:root{
  --negro: #0a0a0e;
  --panel: rgba(20,22,28,0.92);
  --magenta: #c44fb0;
  --dorado: #f5c428;
  --navy: #161a4a;
  --rojo: #c11f35;
  --texto: #f1efe9;
  --texto-tenue: #c7c5cc;
  --verde: #3ecf6e;
  --verde-cesped: #2d7a3a;
}

body{

}

.barra-marca{ height:6px; display:flex; width:100%; position:relative; z-index:2;}
.barra-marca div{flex:1;}
.b1{background:var(--magenta);} .b2{background:var(--dorado);} .b3{background:var(--navy);} .b4{background:var(--rojo);}

.contenedor{ max-width:560px; margin:0 auto; padding:30px 20px 50px; position:relative; z-index:2; }

.logo-wrap{ display:flex; flex-direction:column; align-items:center; margin-bottom:14px; }
.logo-wrap img{ width:230px; filter: drop-shadow(0 4px 18px rgba(0,0,0,0.5)); margin-bottom:14px;}

.badge-mundial{
  display:inline-flex; align-items:center; gap:6px;
  background: rgba(245,196,40,0.12);
  border:1px solid rgba(245,196,40,0.4);
  color: var(--dorado);
  font-size:11px; font-weight:700; letter-spacing:1px;
  padding:5px 12px; border-radius:999px;
  margin:0 auto 14px; text-transform:uppercase;
}

h1{ text-align:center; font-size:24px; font-weight:800; margin:4px 0 8px; text-shadow:0 2px 10px rgba(0,0,0,0.4);}
p.sub{ text-align:center; color:var(--texto-tenue); font-size:14px; margin-bottom:28px; line-height:1.5; }

.tarjeta-desafio{
  background: var(--panel);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:14px;
  padding:18px 20px;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:16px;
  text-decoration:none;
  color: var(--texto);
  transition: transform .12s ease, border-color .12s ease;
  backdrop-filter: blur(6px);
}
.tarjeta-desafio.activa:hover{ transform: translateY(-2px); border-color: var(--dorado); }
.tarjeta-desafio.bloqueada{ opacity:0.6; cursor:default; }
.tarjeta-desafio.completada{ opacity:0.75; cursor:default; border-color:rgba(62,207,110,0.25); }

.icono-desafio{ font-size:30px; width:42px; text-align:center; }
.info-desafio{ flex:1; }
.info-desafio strong{ display:block; font-size:15.5px; margin-bottom:3px; }
.info-desafio span{ font-size:12.5px; color:var(--texto-tenue); display:block; }
.info-desafio .estado-liberacion{ font-size:11.5px; margin-top:5px; font-weight:700; }
.estado-liberacion.disponible{ color: var(--verde); }
.estado-liberacion.bloqueado{ color: var(--dorado); }
.estado-liberacion.completado{ color: var(--verde); }

.candado{ font-size:18px; opacity:0.7; }

footer.pie{ text-align:center; margin-top:24px; font-size:11px; color:#8a8894; position:relative; z-index:2;}

.btn-audio-menu{
  position:fixed;
  top:14px; right:14px;
  background: rgba(20,20,26,0.85);
  border:1px solid rgba(255,255,255,0.15);
  color: var(--texto);
  border-radius:8px;
  width:38px; height:38px;
  font-size:16px;
  cursor:pointer;
  z-index:10;
}

.balon-decorativo{
  position:absolute;
  width:34px; height:34px;
  opacity:0.5;
  z-index:1;
  pointer-events:none;
}
</style>

let AUDIO_CTX = null;
let AUDIO_ACTIVO = true;
let MUSICA_NODOS = null;

function getAudioCtx(){
  if(!AUDIO_CTX){
    AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();
  }
  return AUDIO_CTX;
}

function reanudarAudioSiNecesario(){
  const ctx = getAudioCtx();
  if(ctx.state === 'suspended'){
    ctx.resume();
  }
}

function sfxAcierto(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.07;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.09, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.2);
  });
}

function sfxError(){

  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.35);
  gain.gain.setValueAtTime(0.09, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.36);
}

function sfxVictoria(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [392, 523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.1;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.12, t0+0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.32);
  });
}

// ---- Música de fondo animada: melodía + bajo + percusión simple, en loop ----
// Patrón inspirado en arcade retro: bajo marcando el pulso, melodía sincopada arriba, hi-hat ligero.

const MUSICA_BAJO    = [196, 196, 246.94, 196, 220, 220, 261.63, 220];
const MUSICA_MELODIA = [392, 0, 523.25, 466.16, 392, 0, 440, 392, 523.25, 0, 587.33, 523.25, 440, 0, 392, 0];
const MUSICA_TEMPO_PASO = 0.16; // segundos por paso de melodia (rapido, animado)

function iniciarMusicaFondo(){
  if(!AUDIO_ACTIVO) return;
  detenerMusicaFondo();
  const ctx = getAudioCtx();
  const master = ctx.createGain();
  master.gain.value = 0.065;
  master.connect(ctx.destination);

  let pasoMelodia = 0;
  let pasoBajo = 0;

  function programarPasoMelodia(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_MELODIA[pasoMelodia % MUSICA_MELODIA.length];
    if(freq > 0){
      const osc = ctxNow.createOscillator();
      const gain = ctxNow.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t0 = ctxNow.currentTime;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.linearRampToValueAtTime(0.07, t0+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*0.85);
      osc.connect(gain); gain.connect(master);
      osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO);
    }
    // hi-hat ligero en pasos pares
    if(pasoMelodia % 2 === 0){
      const bufferSize = ctxNow.sampleRate * 0.02;
      const buffer = ctxNow.createBuffer(1, bufferSize, ctxNow.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1)*0.3; }
      const noise = ctxNow.createBufferSource();
      noise.buffer = buffer;
      const hatGain = ctxNow.createGain();
      hatGain.gain.value = 0.025;
      noise.connect(hatGain); hatGain.connect(master);
      noise.start();
    }
    pasoMelodia++;
  }

  function programarPasoBajo(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_BAJO[pasoBajo % MUSICA_BAJO.length];
    const osc = ctxNow.createOscillator();
    const gain = ctxNow.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctxNow.currentTime;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.08, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*1.7);
    osc.connect(gain); gain.connect(master);
    osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO*2);
    pasoBajo++;
  }

  const intervalMelodia = setInterval(programarPasoMelodia, MUSICA_TEMPO_PASO*1000);
  const intervalBajo = setInterval(programarPasoBajo, MUSICA_TEMPO_PASO*2000);
  MUSICA_NODOS = { master, intervalMelodia, intervalBajo };
  programarPasoMelodia();
  programarPasoBajo();
}

function detenerMusicaFondo(){
  if(MUSICA_NODOS){
    clearInterval(MUSICA_NODOS.intervalMelodia);
    clearInterval(MUSICA_NODOS.intervalBajo);
    try{ MUSICA_NODOS.master.disconnect(); }catch(e){}
    MUSICA_NODOS = null;
  }
}

function toggleAudio(){
  AUDIO_ACTIVO = !AUDIO_ACTIVO;
  if(!AUDIO_ACTIVO){
    detenerMusicaFondo();
  } else {
    reanudarAudioSiNecesario();
    iniciarMusicaFondo();
  }
  return AUDIO_ACTIVO;
}

</script>
<script>
// ============================================================
// LÓGICA DEL MENÚ PRINCIPAL
// ============================================================

function formatearFechaLiberacion(fecha){
  const dias = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

  // Convertir a hora de Guatemala para mostrar al usuario
  const horaGT = new Date(fecha.getTime() - 6*60*60*1000);
  const diaSemana = dias[horaGT.getUTCDay()];
  const dia = horaGT.getUTCDate();
  const mes = meses[horaGT.getUTCMonth()];
  let hora = horaGT.getUTCHours();
  const minuto = horaGT.getUTCMinutes();
  const ampm = hora >= 12 ? 'pm' : 'am';
  let hora12 = hora % 12;
  if(hora12 === 0) hora12 = 12;
  const minutoTxt = minuto === 0 ? '' : `:${String(minuto).padStart(2,'0')}`;

  return `${diaSemana} ${dia} de ${mes}, ${hora12}${minutoTxt} ${ampm}`;
}

// Determina el estado de un desafío: 'bloqueado' | 'activo' | 'cerrado'
function estadoDesafio(desafio){
  const ahora = new Date();
  if(ahora < desafio.fechaLiberacion) return 'bloqueado';
  if(desafio.fechaCierre && ahora >= desafio.fechaCierre) return 'cerrado';
  return 'activo';
}

function renderMenu(){
  const cont = document.getElementById('lista-desafios');
  cont.innerHTML = '';

  DESAFIOS.forEach(desafio => {
    const estado = estadoDesafio(desafio);

    if(estado === 'activo'){
      const a = document.createElement('a');
      a.href = desafio.url;
      a.className = 'tarjeta-desafio activa';
      a.innerHTML = `
        <div class="icono-desafio">${desafio.icono}</div>
        <div class="info-desafio">
          <strong>${desafio.nombre}</strong>
          <span>${desafio.descripcion}</span>
          <span class="estado-liberacion disponible">● Disponible ahora${desafio.fechaCierre ? ' · cierra ' + formatearFechaLiberacion(desafio.fechaCierre) : ''}</span>
        </div>
      `;
      cont.appendChild(a);

    } else if(estado === 'cerrado'){
      const div = document.createElement('div');
      div.className = 'tarjeta-desafio completada';
      div.innerHTML = `
        <div class="icono-desafio">${desafio.icono}</div>
        <div class="info-desafio">
          <strong>${desafio.nombre}</strong>
          <span>${desafio.descripcion}</span>
          <span class="estado-liberacion completado">✅ Fase completada</span>
        </div>
      `;
      cont.appendChild(div);

    } else {
      const div = document.createElement('div');
      div.className = 'tarjeta-desafio bloqueada';
      div.innerHTML = `
        <div class="icono-desafio">${desafio.icono}</div>
        <div class="info-desafio">
          <strong>${desafio.nombre}</strong>
          <span>${desafio.descripcion}</span>
          <span class="estado-liberacion bloqueado">🔒 Disponible ${formatearFechaLiberacion(desafio.fechaLiberacion)}</span>
        </div>
        <div class="candado">🔒</div>
      `;
      cont.appendChild(div);
    }
  });
}

function dataUrlIsotipo(){
  const b64 = document.getElementById('b64-logo').textContent.trim();
  return "data:image/png;base64," + b64;
}

function iniciarMenu(){
  document.getElementById('logo-menu').src = dataUrlIsotipo();
  renderMenu();
  // Revisar cada minuto si algun desafio se acaba de liberar, para refrescar sin que el usuario recargue
  setInterval(renderMenu, 60000);

  iniciarMusicaFondo();
  document.getElementById('btn-audio-menu').addEventListener('click', (e) => {
    const activo = toggleAudio();
    e.target.textContent = activo ? '🔊' : '🔇';
  });
}

document.addEventListener('DOMContentLoaded', iniciarMenu);
document.addEventListener('click', () => reanudarAudioSiNecesario(), { once: true });

</script>
