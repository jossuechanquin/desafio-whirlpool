#overlay-oscuro{
  position:fixed; inset:0; z-index:0;
  background: linear-gradient(180deg, rgba(8,8,12,0.55) 0%, rgba(8,8,12,0.88) 35%, rgba(8,8,12,0.94) 100%);
}
.balon-decorativo{
  position:absolute; width:30px; height:30px; opacity:0.45; z-index:1; pointer-events:none;
}

.barra-marca{ height:6px; display:flex; width:100%; position:relative; z-index:2; }
.barra-marca div{flex:1;}
.b1{background:var(--magenta);} .b2{background:var(--dorado);} .b3{background:var(--navy);} .b4{background:var(--rojo);}

.contenedor{ max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; position:relative; z-index:2; }

header.top{ display:flex; align-items:center; gap:14px; margin-bottom: 22px; }
header.top img{ width:160px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

.pantalla{
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 28px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
}

.hero-isotipo{ display:flex; justify-content:center; margin-bottom: 14px; }
.hero-isotipo img{ width: 230px; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }

.intro-titulo{ text-align:center; font-size: 26px; font-weight: 800; margin: 6px 0 6px; line-height:1.3; }
.intro-sub{ text-align:center; color: var(--texto-tenue); font-size: 14.5px; margin-bottom: 26px; line-height:1.5; }

label.campo-label{ display:block; font-size: 12.5px; color: var(--texto-tenue); margin-bottom: 8px; text-transform:uppercase; letter-spacing: 1px; }
input[type="text"]{
  width: 100%; background: var(--negro2); border: 1px solid #34343b; color: var(--texto);
  padding: 14px 16px; border-radius: 10px; font-size: 15px; outline:none;
}
input[type="text"]:focus{ border-color: var(--dorado); }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
  margin-top: 18px; background: var(--dorado); color: #1a1505; font-weight: 800; font-size: 15px;
  border:none; padding: 15px 18px; border-radius: 10px; cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease; text-decoration:none;
}
.btn:hover{ transform: translateY(-1px); box-shadow: 0 8px 18px rgba(245,196,40,0.25); }
.btn:active{ transform: translateY(0); }
.btn.secundario{ background: transparent; color: var(--texto); border: 1px solid #3a3a42; }
.btn.chico{ width:auto; padding:10px 16px; font-size:13px; margin-top:0;}
.btn:disabled{ opacity:.45; cursor:not-allowed; }

.opciones-intento{ display:flex; flex-direction:column; gap:12px; margin-top: 18px; }
.intento-card{
  background: var(--negro2); border:1px solid #2c2c32; border-radius:12px; padding:16px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.intento-card .info-i strong{ display:block; font-size:14px; margin-bottom:3px;}
.intento-card .info-i span{ font-size:12px; color:var(--texto-tenue);}

.hud{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
.hud .ronda-tag{ font-size: 10.5px; background: var(--negro2); border:1px solid #34343b; padding: 7px 12px; border-radius: 999px; color: var(--dorado); letter-spacing:0.5px; }
.hud .progreso-wrap{ flex:1; min-width:160px; }
.hud .barra-progreso{ height:8px; background: var(--negro2); border-radius:999px; overflow:hidden; border:1px solid #2c2c32; }
.hud .barra-progreso > div{ height:100%; background: linear-gradient(90deg, var(--dorado), #fff3b0); transition: width .3s ease; }
.hud .score-box{ font-size: 13px; font-weight:700; background: var(--negro2); border:1px solid #34343b; padding:7px 14px; border-radius:999px; }

.btn-audio-cuestionario{ background: var(--negro2); border:1px solid #34343b; color: var(--texto); border-radius:8px; width:34px; height:34px; font-size:14px; cursor:pointer; }

.pregunta-num{ font-size:12px; color:var(--texto-tenue); margin-bottom:8px; }
.pregunta-texto{ font-size: 18px; font-weight:700; line-height:1.4; margin-bottom: 22px;}

.opciones{ display:flex; flex-direction:column; gap:11px; }
.opcion{
  background: var(--negro2); border: 1.5px solid #34343b; color: var(--texto); text-align:left;
  padding: 14px 16px; border-radius: 10px; font-size: 14.5px; cursor:pointer; transition: all .15s ease; line-height:1.4;
}
.opcion:hover:not(:disabled){ border-color: var(--dorado); background:#211f15; }
.opcion:disabled{ cursor:default; }
.opcion.correcta{ border-color: var(--correcto); background: rgba(62,207,110,0.12); }
.opcion.incorrecta{ border-color: var(--incorrecto); background: rgba(226,71,58,0.12); }

.retro-box{ margin-top:20px; padding:16px 18px; border-radius: 10px; font-size: 13.5px; line-height:1.55; border-left: 4px solid var(--dorado); background: var(--negro2); }
.retro-box.ok{ border-left-color: var(--correcto); }
.retro-box.no{ border-left-color: var(--incorrecto); }
.retro-box .etiqueta{ font-weight:800; display:block; margin-bottom:6px; font-size:12.5px; letter-spacing:0.5px; text-transform:uppercase; }
.retro-box.ok .etiqueta{ color: var(--correcto); }
.retro-box.no .etiqueta{ color: var(--incorrecto); }

.siguiente-wrap{ margin-top:20px; }

.transicion{ text-align:center; padding: 30px 10px; }
.transicion .num-ronda{ font-size: 11px; color: var(--dorado); letter-spacing:2px; margin-bottom:10px; }
.transicion h2{ font-size:22px; margin-bottom:10px; }
.transicion p{ color:var(--texto-tenue); font-size:14px; margin-bottom: 22px; line-height:1.6;}

.resultado-score{ text-align:center; margin: 8px 0 24px; }
.resultado-score .num{ font-size: 52px; font-weight:800; color: var(--dorado); line-height:1; }
.resultado-score .lbl{ color:var(--texto-tenue); font-size:13px; margin-top:6px; }
.desglose{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin: 18px 0 22px; }
.desglose .item{ background:var(--negro2); border:1px solid #2c2c32; border-radius:10px; padding:12px 8px; text-align:center; }
.desglose .item .v{ font-size:19px; font-weight:800; color: var(--dorado);}
.desglose .item .k{ font-size:10.5px; color:var(--texto-tenue); margin-top:4px; line-height:1.3;}

.mensaje-venta{
  background: linear-gradient(135deg, rgba(245,196,40,0.08), rgba(196,79,176,0.06));
  border:1px solid #3a3520; border-radius:12px; padding:18px; text-align:center; margin-bottom:22px; font-size:14px; line-height:1.6;
}

.acciones-final{ display:flex; gap:10px; flex-wrap:wrap; }
.acciones-final .btn{ flex:1; margin-top:0; min-width:140px;}

.pie{ text-align:center; margin-top: 26px; font-size: 11px; color: #8a8894; position:relative; z-index:2; }

.spinner-cargando{ display:flex; align-items:center; gap:8px; justify-content:center; font-size:13px; color: var(--texto-tenue); margin-top:14px; }

.oculto{ display:none !important; }

@media (max-width:480px){
  .contenedor{ padding:18px 12px 40px; }
  .pantalla{ padding:20px; }
  .desglose{ grid-template-columns: repeat(3,1fr); }
  .pregunta-texto{ font-size:16.5px; }
  header.top img{ width:120px; }
}
</style>

<script id="datos-preguntas" type="application/json">[{"id": "R1-24", "ronda": 1, "pregunta": "Al recomendar el modelo Centro de Lavado de gas (7MWGT4027HW), ¿qué consideración de instalación es exclusiva de este modelo frente al eléctrico?", "opciones": ["No necesita ninguna conexión especial", "Requiere verificar que el hogar cuente con conexión a cilindro de gas LP (el gas LP en cilindro es lo habitual en Centroamérica, ya que no existen líneas de gas domiciliar como en otros países), además de la conexión eléctrica del panel", "Solo necesita batería", "Funciona sin ningún tipo de energía"], "correcta": 1, "retro": "En Centroamérica no existe la red de gas domiciliar como en otros países, por lo que el modelo a gas utiliza conexión a cilindro de gas LP. El asesor debe confirmar que el cliente cuente con esta instalación y que esté en buen estado, además de la conexión eléctrica del panel de control."}, {"id": "R2-01", "ronda": 2, "pregunta": "¿Qué hace único al agitador del modelo 8MWTW2654WRM de 26 kg (línea Premium)?", "opciones": ["Es fijo y no se puede remover", "Es un agitador removible que permite elegir entre lavado con agitador o estilo impeller en el mismo equipo", "Solo sirve para ropa delicada", "Funciona únicamente con agua fría"], "correcta": 1, "retro": "El agitador 2-en-1 se puede retirar para ganar espacio tipo impeller (ideal para edredones) o dejarse puesto para un lavado tradicional con mayor remoción de manchas. Es una innovación física que el cliente puede tocar y comprobar en el piso de venta."}, {"id": "R2-02", "ronda": 2, "pregunta": "En los modelos pilares 8MWTW2224WJM (22 kg) y 8MWTW2424WPM (24 kg), ¿cuántos movimientos ofrece su agitador 'Double Action'?", "opciones": ["6 movimientos", "8 movimientos", "10 movimientos", "12 movimientos"], "correcta": 1, "retro": "El agitador Double Action ofrece 8 movimientos de lavado. La familia de agitador largo escala así: Single Action (6 movimientos), Double Action (8 movimientos) y Triple Action (10 movimientos), donde a mayor cantidad de movimientos, mayor es la capacidad de remoción de manchas difíciles."}, {"id": "R3-04", "ronda": 3, "pregunta": "El modelo 8MWTW2654WRM de Whirlpool tiene 26 kg de capacidad. Si la competencia ofrece 25 kg como su tope de gama, ¿cómo se posiciona Whirlpool frente a ese competidor?", "opciones": ["Whirlpool queda por debajo en capacidad máxima", "Whirlpool iguala o supera la capacidad máxima ofrecida por ese competidor en su segmento equivalente", "No existe ningún modelo de esa capacidad en Whirlpool", "La capacidad no es comparable entre marcas"], "correcta": 1, "retro": "Frente al tope de gama de la competencia en 25 kg, la plataforma Whirlpool de mayor capacidad iguala o supera ese número, siendo un argumento directo de cierre cuando el cliente prioriza volumen de carga."}, {"id": "R3-06", "ronda": 3, "pregunta": "Un cliente compara el sistema de lavado por impeller (plato) de un competidor contra el agitador Double Action del modelo 8MWTW2224WJM. ¿Cuál es el argumento técnico experto?", "opciones": ["Son exactamente iguales en remoción de manchas", "El agitador Double Action genera más movimiento mecánico directo sobre la ropa, favoreciendo mayor remoción de manchas en cargas con suciedad difícil", "El impeller siempre es superior en todos los casos", "No hay ninguna diferencia relevante para el cliente"], "correcta": 1, "retro": "El sistema de impeller (plato, sin agitador) de algunos competidores no genera la misma fuerza mecánica directa que el agitador Double Action de Whirlpool, que sube y mueve la ropa para una limpieza más profunda en suciedad difícil."}, {"id": "R3-09", "ronda": 3, "pregunta": "Un cliente que busca un modelo de entrada como el WWI14AWHLS (14 kg) menciona que cierta marca de la competencia es 'la marca de toda la vida' para él. ¿Cuál es la mejor respuesta experta sin desacreditar directamente al competidor?", "opciones": ["Decir que esa marca de la competencia es mala calidad", "Reconocer su trayectoria y redirigir la conversación hacia las tecnologías específicas de Whirlpool que resuelven mejor la necesidad puntual del cliente (ahorro, capacidad, garantía)", "No responder nada y cambiar de tema", "Discutir con el cliente sobre cuál marca es mejor en general"], "correcta": 1, "retro": "El manejo experto de objeciones de marca no ataca al competidor directamente; reconoce el punto del cliente y redirige la conversación hacia beneficios concretos: Whirlpool es la marca #1 en lavadoras a nivel mundial, con 114 años de innovación continua. Esa trayectoria se traduce en tecnologías como el agitador 2-en-1, la garantía de 10 años en motor y el llenado manual, que resuelven las necesidades específicas del cliente de forma verificable."}, {"id": "R3-14", "ronda": 3, "pregunta": "¿Cuál es la diferencia clave entre el sistema 2-en-1 del modelo 8MWTW2654WRM y cualquier sistema de doble función ofrecido por la competencia?", "opciones": ["Son exactamente el mismo mecanismo con otro nombre", "El sistema 2-en-1 de Whirlpool es removible físicamente por el usuario, transformando el equipo en agitador o impeller según se necesite, una propuesta de innovación física comprobable en punto de venta", "El sistema de la competencia es siempre superior", "Ninguna marca tiene este tipo de sistema"], "correcta": 1, "retro": "La clave diferenciadora del sistema 2-en-1 de Whirlpool es que el cliente puede físicamente retirar y colocar el agitador, una demostración tangible en el punto de venta que pocas propuestas de la competencia logran igualar de forma tan directa."}, {"id": "SKU-01", "ronda": 2, "pregunta": "El modelo 8MWTW2224WJM (22 kg) es el pilar de volumen de Whirlpool en la región. ¿Qué cifra de venta respalda su liderazgo?", "opciones": ["Más de 5,000 unidades vendidas", "Más de 13,000 unidades vendidas", "Menos de 1,000 unidades vendidas", "No tiene datos de venta relevantes"], "correcta": 1, "retro": "El 8MWTW2224WJM acumula más de 13,000 unidades vendidas en la región: es la marca en la que el mercado ya confía. Mencionar esta cifra le da al cliente seguridad social de que está comprando lo que todos compran."}, {"id": "SKU-02", "ronda": 2, "pregunta": "¿Qué rol comercial tienen los modelos 8MWTW2224WJM (22 kg) y 8MWTW2424WPM (24 kg) dentro del portafolio?", "opciones": ["Son modelos de salida que ya no se venden", "Son los Pilares GTM (volumen principal de la marca)", "Son exclusivos para exportación", "Son modelos de exhibición sin venta"], "correcta": 1, "retro": "Ambos son Pilares GTM: el volumen principal sobre el que se sostiene la marca en el mercado. Dominarlos en argumentación es la base de cualquier asesor experto Whirlpool."}, {"id": "SKU-03", "ronda": 2, "pregunta": "¿Qué posición ocupa el 7MWTW1904LM/DM (19 kg) dentro del portafolio de lavadoras?", "opciones": ["Es el modelo Premium tope de gama", "Es el modelo Estándar de entrada a la marca", "Es un modelo descontinuado", "Es exclusivo para línea semiautomática"], "correcta": 1, "retro": "El 7MWTW1904LM/DM es el modelo Estándar: la puerta de entrada a la marca Whirlpool para el cliente que busca el precio más accesible sin sacrificar la garantía de motor."}, {"id": "SKU-04", "ronda": 2, "pregunta": "¿Dónde se fabrican los modelos 8MWTW2654WRM, 8MWTW2224WJM y 8MWTW2424WPM?", "opciones": ["China", "México", "Vietnam", "Brasil"], "correcta": 1, "retro": "Estos tres modelos se fabrican en México. El origen de fabricación es un dato que algunos clientes valoran al comparar calidad percibida frente a otras marcas fabricadas en otras regiones."}, {"id": "SKU-05", "ronda": 2, "pregunta": "¿Dónde se fabrica el modelo Estándar 7MWTW1904LM/DM, a diferencia de los modelos Pilares GTM y Premium?", "opciones": ["México, igual que los demás", "Estados Unidos", "China", "Brasil"], "correcta": 1, "retro": "El 7MWTW1904LM/DM se fabrica en Estados Unidos, mientras que el 8MWTW2654WRM, el 8MWTW2224WJM y el 8MWTW2424WPM se fabrican en México. Conocer el origen de cada modelo ayuda al asesor a responder con precisión si el cliente pregunta."}, {"id": "SKU-06", "ronda": 3, "pregunta": "¿Qué garantía de motor ofrece el 8MWTW2224WJM frente a la garantía de motor de la competencia en un modelo equivalente de 22 kg?", "opciones": ["Whirlpool ofrece menos garantía", "Whirlpool ofrece 10 años; la competencia ofrece apenas 1 año", "Ambas ofrecen exactamente 10 años", "Ninguna marca ofrece garantía de motor"], "correcta": 1, "retro": "El 8MWTW2224WJM tiene 10 años de garantía de motor, mientras que el modelo equivalente de la competencia ofrece apenas 1 año. Esta diferencia es uno de los argumentos de cierre más sólidos frente a esa competencia específica."}, {"id": "SKU-07", "ronda": 3, "pregunta": "Cuando la competencia ha liderado en volumen de ventas, ¿en qué se basa principalmente?", "opciones": ["Innovación tecnológica superior", "Incentivos de precio, sin un valor diferencial real de producto", "Garantía de motor más extensa que Whirlpool", "Capacidad de carga superior a Whirlpool"], "correcta": 1, "retro": "La competencia suele liderar volumen apoyándose en incentivos de precio, no en un valor diferencial real de producto. El asesor experto debe llevar la conversación hacia valor (garantía, tecnología, llenado manual) en vez de competir solo en precio."}, {"id": "SKU-08", "ronda": 3, "pregunta": "Un cliente menciona que los modelos automáticos de la competencia se bloquean cuando baja la presión de agua en su zona. ¿Qué argumento usa el asesor con el 8MWTW2224WJM?", "opciones": ["Whirlpool tiene el mismo problema que la competencia", "El 8MWTW2224WJM permite continuar el ciclo mediante llenado manual con cubeta, sin depender de la red hidráulica", "Recomendar no comprar ninguna lavadora automática", "Decir que ese problema no existe en ninguna marca"], "correcta": 1, "retro": "El 8MWTW2224WJM, como gran parte del portafolio Whirlpool, permite llenado manual con cubeta, garantizando que el ciclo continúe sin depender de la presión de agua de la red. Es una ventaja directa y vital para el hogar centroamericano."}, {"id": "SKU-09", "ronda": 3, "pregunta": "En ciertos mercados, la competencia controla gran parte del volumen base con sistemas de lavado básicos. ¿Qué modelo Whirlpool se usa como contraste de innovación frente a ella?", "opciones": ["El modelo Estándar 7MWTW1904LM", "El modelo 8MWTW2654WRM de 26 kg con agitador extraíble 2-en-1", "El Centro de Lavado 7MWET4027HW", "Ningún modelo compite directamente"], "correcta": 1, "retro": "Frente al agitador de espiral básico de varios competidores, el 8MWTW2654WRM con su sistema 2-en-1 extraíble ofrece dos tecnologías de lavado en una sola máquina, optimizando espacio para piezas voluminosas y dando una innovación física comprobable en el piso de venta."}, {"id": "SKU-10", "ronda": 3, "pregunta": "Cierta competencia domina volumen en algunos mercados con equipos de 22 kg, pero su sistema de lavado es por impeller (plato). ¿Qué limita exactamente ese sistema frente al 8MWTW2224WJM?", "opciones": ["No tiene ninguna limitación, es igual de efectivo", "Carece de la fuerza mecánica necesaria para mover cargas pesadas eficazmente, a diferencia del agitador Double Action que sube y baja la ropa", "Solo funciona con agua caliente", "Tiene mayor capacidad que Whirlpool"], "correcta": 1, "retro": "El sistema impeller de plato de ese tipo de competencia carece de la fuerza mecánica necesaria para mover cargas pesadas con eficacia. El agitador Double Action del 8MWTW2224WJM garantiza que la ropa suba y baje para una limpieza profunda."}, {"id": "SKU-11", "ronda": 3, "pregunta": "¿Cuál es el 'golpe final de capacidad' que ofrece el 8MWTW2654WRM de 26 kg frente al tope de gama de la competencia?", "opciones": ["Whirlpool se queda corto frente a la competencia", "La plataforma de 26 kg supera los 25 kg de la competencia, ofreciendo la mayor capacidad de carga superior del segmento", "Ambas marcas ofrecen exactamente la misma capacidad máxima", "La capacidad no es un argumento relevante en este segmento"], "correcta": 1, "retro": "La plataforma de 26 kg de Whirlpool supera los 25 kg de la competencia, ofreciendo la mayor capacidad de carga superior del segmento. Sumado al Xpert Dual Agitator, Whirlpool elimina la indecisión entre comprar una lavadora de agitador o de plato."}, {"id": "SKU-12", "ronda": 1, "pregunta": "El modelo WW20BTAHLA pertenece a la familia Xpert Eco de 17 a 21 kg. ¿Qué permite su opción de llenado en la instalación?", "opciones": ["Solo llenado automático, sin alternativa", "Llenado manual con cubeta como alternativa ante baja presión de agua", "Requiere doble línea de agua caliente obligatoria", "No requiere ninguna conexión de agua"], "correcta": 1, "retro": "El WW20BTAHLA, como gran parte de la familia Xpert Eco, permite llenado manual con cubeta. Esta es una recomendación de instalación clave a comunicar en zonas con suministro de agua irregular."}, {"id": "SKU-13", "ronda": 2, "pregunta": "¿Qué tecnología de ahorro distingue a la familia Xpert Eco, a la que pertenece el WW20BTAHLA, y cómo se conecta el ahorro de agua con el ahorro de energía?", "opciones": ["Xpert Water Saver exclusivamente, sin relación con la energía", "Una opción que reduce el agua usada en el ciclo; al usar menos agua, el motor y la bomba trabajan menos, por lo que también se reduce el consumo de kilowatts", "No tiene ninguna tecnología de ahorro", "Solo ahorra detergente"], "correcta": 1, "retro": "La familia Xpert Eco, donde está el WW20BTAHLA, ahorra agua y energía de forma conectada: al reducir la cantidad de agua que debe moverse, calentarse y bombearse en cada carga, el motor y el sistema de bombeo trabajan menos, lo que se traduce directamente en menor consumo de kilowatts. Es un solo beneficio con dos caras: menos agua usada significa menos trabajo eléctrico, y por lo tanto menor gasto en el recibo de luz."}, {"id": "SKU-14", "ronda": 2, "pregunta": "¿Cuál es el esquema de garantía completo de los modelos de la familia Xpert Eco (17-21 kg), como el WW20BTAHLA?", "opciones": ["Solo 1 año en todo el equipo", "10 años en motor, 5 años en panel y 1 año total del producto", "Garantía de por vida sin condiciones", "5 años en motor únicamente"], "correcta": 1, "retro": "El esquema correcto es: 10 años de garantía en el motor, 5 años en el panel y 1 año de garantía total del producto. El asesor debe explicar estas tres coberturas por separado para que el cliente entienda exactamente qué cubre cada una."}, {"id": "SKU-15", "ronda": 1, "pregunta": "El modelo WWI14AWHLS (14 kg) pertenece a la familia Navy de 10 a 14 kg. ¿Qué tipo de hogar es el público objetivo natural de esta familia?", "opciones": ["Hogares con necesidad de máxima capacidad (26+ kg)", "Hogares con menor volumen de ropa o espacios más reducidos, que buscan un modelo de entrada", "Solo lavanderías comerciales", "Exclusivamente hoteles"], "correcta": 1, "retro": "La familia Navy (10-14 kg), donde está el WWI14AWHLS, está pensada para hogares con menor volumen de ropa o espacios reducidos, sirviendo como un modelo de entrada accesible a la marca Whirlpool."}, {"id": "SKU-16", "ronda": 2, "pregunta": "¿Cuántos ciclos y temperaturas ofrece el WWI14AWHLS de la familia Navy?", "opciones": ["3 ciclos + 1 temperatura", "6 ciclos + 3 temperaturas", "12 ciclos + 5 temperaturas", "Solo 1 ciclo fijo"], "correcta": 1, "retro": "El WWI14AWHLS ofrece 6 ciclos más 3 temperaturas, con ciclos específicos que ayudan al cuidado de las prendas, permitiendo ropa limpia en poco tiempo."}, {"id": "SKU-17", "ronda": 2, "pregunta": "¿Qué uso eficiente de agua ofrece el WWI14AWHLS a través de sus niveles de agua?", "opciones": ["Un solo nivel fijo sin ajuste", "8 niveles de agua que se adaptan a la cantidad de ropa cargada", "Llenado siempre al máximo sin importar la carga", "No tiene control de nivel de agua"], "correcta": 1, "retro": "El WWI14AWHLS cuenta con 8 niveles de agua que se adaptan a la cantidad de ropa cargada, evitando desperdicio incluso en un modelo de entrada de la familia Navy."}, {"id": "SKU-18", "ronda": 1, "pregunta": "El modelo conectado 8MWTW2640WJB (26 kg) requiere, además de la conexión eléctrica estándar, verificar:", "opciones": ["Una línea de gas adicional", "Conectividad WiFi disponible en el hogar para aprovechar la app Whirlpool, aunque no es indispensable para funcionar en lavado tradicional", "Doble tomacorriente de 220V", "No requiere ninguna verificación adicional"], "correcta": 1, "retro": "Como el 8MWTW2640WJB se conecta a la app Whirlpool vía WiFi, conviene verificar que el hogar del cliente tenga buena señal de red en el área de lavado para que pueda aprovechar todas las funciones conectadas."}, {"id": "SKU-19", "ronda": 2, "pregunta": "¿Cuántos ciclos de lavado ofrece el modelo conectado 8MWTW2640WJB de 26 kg?", "opciones": ["12 ciclos", "20 ciclos", "36 ciclos", "8 ciclos"], "correcta": 2, "retro": "El 8MWTW2640WJB ofrece 36 ciclos de lavado, además de conectividad WiFi con la app Whirlpool. Es el modelo ideal para el cliente que busca máxima personalización y tecnología conectada."}, {"id": "SKU-20", "ronda": 2, "pregunta": "¿Qué potencia de motor y velocidad de centrifugado tiene el 8MWTW2640WJB?", "opciones": ["1/3 de caballo de fuerza y 770 RPM", "1 caballo de fuerza y 1200 RPM", "1/2 caballo de fuerza y 500 RPM", "No tiene motor eléctrico"], "correcta": 0, "retro": "El 8MWTW2640WJB tiene un motor de 1/3 de caballo de fuerza con 770 RPM de centrifugado. Conocer esta ficha técnica da al asesor autoridad frente a un cliente que pregunte specs concretas."}, {"id": "SKU-21", "ronda": 2, "pregunta": "¿Hasta qué peso soporta la Tapa Edge del 8MWTW2640WJB?", "opciones": ["30 kg", "50 kg", "70 kg", "100 kg"], "correcta": 2, "retro": "La Tapa Edge del 8MWTW2640WJB, de diseño moderno sin bordes, aguanta hasta 70 kg, comunicando una sensación de resistencia y calidad premium en el punto de venta."}, {"id": "SKU-22", "ronda": 1, "pregunta": "El Centro de Lavado 4027 existe en dos versiones según la fuente de energía del secado. ¿Cuáles son y qué debe considerar el asesor al recomendar cada una?", "opciones": ["Versión básica y versión premium", "Versión eléctrica (7MWET4027HW) y versión a gas LP con cilindro (7MWGT4027HW); la versión a elegir depende de la instalación disponible en el hogar del cliente", "Versión compacta y versión extendida", "Solo existe una versión única"], "correcta": 1, "retro": "Existen dos versiones: el 7MWET4027HW (secado eléctrico) y el 7MWGT4027HW (secado a gas LP con cilindro, ya que en Centroamérica no existe gas domiciliar por tubería). El asesor debe preguntar con qué instalación cuenta el cliente antes de recomendar cuál de las dos versiones es la adecuada para su hogar."}, {"id": "SKU-23", "ronda": 2, "pregunta": "¿Qué capacidad de lavado y secado ofrece el Centro de Lavado 7MWET4027HW?", "opciones": ["10 kg de lavado, 5 kg de secado", "20 kg de lavado en una misma carga, 12 kg de secado", "30 kg de lavado, 20 kg de secado", "No tiene función de secado"], "correcta": 1, "retro": "El 7MWET4027HW tiene capacidad de hasta 20 kg de ropa en una misma carga de lavado y 12 kg en secado, siendo el Centro de Lavado de mayor capacidad en su clase."}, {"id": "SKU-24", "ronda": 2, "pregunta": "¿Qué hace el sistema Sensor Dry Xpert del 7MWET4027HW durante el secado?", "opciones": ["Aumenta la temperatura sin control", "Detecta automáticamente cuándo la ropa llega al nivel óptimo de secado y detiene el ciclo para evitar sobre-secar", "Apaga el equipo sin completar el ciclo", "Solo funciona en la versión de gas"], "correcta": 1, "retro": "El Sensor Dry Xpert del 7MWET4027HW detecta automáticamente cuándo la ropa llega al nivel óptimo de secado y detiene el ciclo para evitar dañar las prendas por sobre-secado, ahorrando tiempo y energía."}, {"id": "SKU-25", "ronda": 3, "pregunta": "Un cliente con espacio reducido pregunta por qué elegir el Centro de Lavado 4027 en vez de comprar lavadora y secadora por separado de la competencia. ¿Cuál es el argumento experto?", "opciones": ["No hay ninguna ventaja real", "El Centro de Lavado 4027 combina ambas funciones en un gabinete compacto ideal para un apartamento u espacio reducido, ofreciendo la mayor capacidad de lavado en su categoría y eliminando la necesidad de tener dos equipos por separado", "Siempre es más caro sin ningún beneficio", "Solo sirve para lavanderías comerciales"], "correcta": 1, "retro": "El Centro de Lavado 4027 permite lavar y secar en un espacio reducido como un apartamento, sin necesidad de dos equipos separados. Su gabinete compacto cabe donde dos equipos no cabrían, y ofrece la mayor capacidad de lavado de su categoría. Es la solución ideal para quien quiere máxima funcionalidad sin sacrificar espacio."}, {"id": "SKU-26", "ronda": 3, "pregunta": "¿Cuál es el mensaje central de la guía de ventas Whirlpool para la temporada que enfatiza el modelo 8MWTW2654WRM de 26 kg?", "opciones": ["Competir únicamente por precio bajo", "Máxima versatilidad: el poder del 2-en-1, superando a la competencia con una innovación física que el cliente puede tocar y comprobar en el piso de venta", "Eliminar la garantía para reducir costos", "Enfocarse solo en el color del equipo"], "correcta": 1, "retro": "El mensaje central es la máxima versatilidad del 2-en-1: Whirlpool es el único que ofrece dos lavadoras en una, superando a la competencia con una innovación física comprobable en el piso de venta, no solo en el papel."}, {"id": "SKU-27", "ronda": 3, "pregunta": "Según la estrategia de defensa frente a la competencia, ¿en qué debe enfocarse el vendedor para no caer en guerra de precios?", "opciones": ["Bajar el precio para igualar a la competencia", "Enfatizar que Whirlpool funciona siempre (llenado manual) y respaldar con la garantía de 10 años en motor, ganando con valor real sobre el descuento temporal", "Ignorar la comparación por completo", "Recomendar al cliente comprar el producto de la competencia si insiste"], "correcta": 1, "retro": "La estrategia de defensa indica enfatizar que Whirlpool funciona siempre gracias al llenado manual, respaldado por la garantía de 10 años en motor. Esto es valor real frente al descuento temporal de la competencia, evitando la guerra de precios."}, {"id": "SKU-28", "ronda": 1, "pregunta": "Antes de recomendar el Centro de Lavado 7MWGT4027HW (versión de gas) en la instalación, ¿qué debe verificar el asesor con el cliente?", "opciones": ["Solo el color disponible", "Que el hogar cuente con conexión a cilindro de gas LP (en Centroamérica no hay líneas de gas domiciliar) y que esté en buen estado, además de la conexión eléctrica del panel", "Que tenga WiFi en el hogar", "No requiere ninguna verificación especial"], "correcta": 1, "retro": "El 7MWGT4027HW requiere conexión a cilindro de gas LP, ya que en Centroamérica no existen redes de gas domiciliar como en otros países. Confirmar esta instalación antes de la venta evita una instalación fallida o un cliente insatisfecho. Además, se requiere la conexión eléctrica del panel de control."}, {"id": "R1-01", "ronda": 1, "pregunta": "¿Está permitido usar adaptadores o extensiones eléctricas de tres espigas a dos para conectar una lavadora Whirlpool?", "opciones": ["Sí, siempre que sea de buena calidad", "No, nunca se debe usar este tipo de adaptador", "Solo en modelos de carga frontal", "Solo si el cliente lo solicita"], "correcta": 1, "retro": "Nunca se debe usar adaptador de tres a dos espigas. Es una de las reglas de oro de instalación: la lavadora debe ir directo a un tomacorriente polarizado de tres conectores."}, {"id": "R1-04", "ronda": 1, "pregunta": "¿Qué circuito eléctrico exclusivo se recomienda para una lavadora?", "opciones": ["Circuito compartido con el refrigerador", "Circuito exclusivo de 20 amperios", "Circuito de cualquier amperaje", "No requiere circuito exclusivo"], "correcta": 1, "retro": "Se recomienda un circuito exclusivo de 20 amperios para la lavadora. Compartir circuito con otros electrodomésticos puede causar caídas de voltaje que afectan el desempeño del motor."}, {"id": "R1-08", "ronda": 1, "pregunta": "Las lavadoras de carga frontal y las lavasecadoras tienen tornillos/pernos que sostienen el tambor durante el transporte. ¿Qué debe hacerse con ellos al instalar?", "opciones": ["Deben dejarse puestos siempre", "Deben retirarse antes de poner en marcha el equipo", "Solo se retiran si el cliente lo pide", "Se retiran después de 6 meses de uso"], "correcta": 1, "retro": "Los pernos de transporte, presentes tanto en lavadoras de carga frontal como en lavasecadoras, deben retirarse obligatoriamente antes de la instalación final; de lo contrario, se pueden generar vibraciones excesivas y daño al tambor o a la suspensión del equipo."}, {"id": "R1-10", "ronda": 1, "pregunta": "¿Cuál es una consecuencia directa de NO nivelar correctamente una lavadora durante la instalación?", "opciones": ["Mejora el centrifugado", "Vibraciones excesivas, ruido y desgaste prematuro de componentes", "Ahorra más energía", "Aumenta la capacidad de carga"], "correcta": 1, "retro": "Una lavadora mal nivelada genera vibración excesiva durante el centrifugado, lo que puede provocar ruido, desplazamiento del equipo y desgaste acelerado de la suspensión y rodamientos."}, {"id": "R1-13", "ronda": 1, "pregunta": "Un asesor instala mal el contacto a tierra de una lavadora. ¿Cuál es el riesgo principal para el usuario final?", "opciones": ["Mayor consumo de detergente", "Riesgo de choque eléctrico para las personas que usan el equipo", "El motor durará más años", "El ciclo de lavado será más corto"], "correcta": 1, "retro": "Un contacto sin tierra adecuada representa riesgo de choque eléctrico directo para el usuario. Es una de las razones por las que la revisión de aterrizaje es obligatoria antes de poner en marcha el equipo."}, {"id": "R1-15", "ronda": 1, "pregunta": "¿Qué pregunta de diagnóstico es clave hacerle al cliente ANTES de recomendar una lavasecadora (combo lavado y secado en un solo tambor)?", "opciones": ["¿Qué color prefiere?", "¿Tiene restricción de espacio o de ventilación?", "¿Cuántas veces lava por semana?", "¿Tiene mascotas?"], "correcta": 1, "retro": "Identificar si el cliente tiene restricción de espacio o ventilación es el primer paso del pitch de venta para lavasecadoras: son consumidores que buscan una solución secundaria o simplificar el proceso en espacios reducidos."}, {"id": "R1-16", "ronda": 1, "pregunta": "Al vender una lavasecadora combo, ¿qué expectativa debes manejar con el cliente sobre el tiempo de secado?", "opciones": ["Es más rápido que una secadora independiente", "El tiempo de secado es más largo, aunque el performance de secado es el mismo", "No seca, solo lava", "Seca en menos de 10 minutos siempre"], "correcta": 1, "retro": "Parte clave del manejo de expectativas: el tiempo de secado del combo es más largo que el de una secadora independiente, aunque el resultado final de secado es igual de efectivo. Por eso se recomienda para dejar la ropa secando durante la noche."}, {"id": "R1-19", "ronda": 1, "pregunta": "¿Por qué es importante revisar la polaridad del tomacorriente antes de instalar la lavadora?", "opciones": ["Para que el panel digital encienda con otro color", "Porque una polaridad incorrecta puede afectar el funcionamiento seguro de los componentes electrónicos", "Solo afecta la velocidad de centrifugado", "No tiene ningún efecto real"], "correcta": 1, "retro": "La polaridad incorrecta puede generar funcionamiento errático o daño a componentes electrónicos sensibles como el panel de control. Por eso la revisión de polaridad es parte del protocolo estándar de instalación."}, {"id": "R1-23", "ronda": 1, "pregunta": "¿Qué riesgo corre la garantía del motor si se detecta que la instalación fue hecha con extensiones o adaptadores no permitidos?", "opciones": ["Ninguno, la garantía sigue intacta siempre", "Puede verse comprometida al no seguir las recomendaciones oficiales de instalación", "Se extiende automáticamente a 15 años", "Se transfiere a otro electrodoméstico"], "correcta": 1, "retro": "Seguir el protocolo de instalación (sin extensiones ni adaptadores) protege tanto al cliente como la validez de la garantía. Es un argumento de venta importante: una instalación correcta resguarda la inversión del cliente."}, {"id": "R1-28", "ronda": 1, "pregunta": "Si un cliente insiste en instalar su lavadora él mismo sin seguir las recomendaciones oficiales, ¿cuál es el mensaje clave que debe transmitir el asesor en el punto de venta?", "opciones": ["No importa, cualquier instalación funciona igual", "Una instalación correcta protege el rendimiento del equipo, la seguridad del hogar y la garantía. Recomienda al cliente leer el manual de instalación.", "Whirlpool no tiene ninguna recomendación al respecto", "Solo los técnicos certificados pueden tocar el tema, el asesor no debe mencionar nada"], "correcta": 1, "retro": "Parte del rol del asesor experto es comunicar con claridad que seguir las recomendaciones de instalación protege tres cosas: el rendimiento del equipo, la seguridad eléctrica del hogar y la validez de la garantía."}, {"id": "R2-03", "ronda": 2, "pregunta": "¿Qué beneficio le ofrece al consumidor el ciclo Xpert Water Saver presente en la línea 2-en-1, y cómo se traduce ese ahorro de agua en el recibo de luz?", "opciones": ["Lava más rápido, sin ningún efecto en el consumo eléctrico", "Permite ahorrar una cantidad considerable de agua durante el ciclo; al usar menos agua, el motor y la bomba consumen menos energía, reduciendo también el gasto eléctrico", "Solo funciona con ropa de color", "Aumenta la temperatura del agua"], "correcta": 1, "retro": "Xpert Water Saver ahorra agua en el ciclo de lavado, y ese ahorro tiene un efecto en cadena: menos agua que bombear y mover significa menos trabajo para el motor y la bomba, lo que se traduce en menor consumo de kilowatts. Es un argumento de venta más completo: no solo se cuida el agua, también se reduce el recibo de luz del hogar."}, {"id": "R2-04", "ronda": 2, "pregunta": "¿Qué tecnología permite que la lavadora identifique automáticamente el tamaño de la carga para optimizar el uso de agua?", "opciones": ["Xpert Eco", "Smart Sensor / Autolevel", "Tapa Edge", "Multidispensador"], "correcta": 1, "retro": "Smart Sensor (también referido como Autolevel en algunas familias) detecta el tamaño de carga automáticamente y ajusta el nivel de agua necesario, evitando desperdicio."}, {"id": "R2-05", "ronda": 2, "pregunta": "¿Cuál es el beneficio principal del Multidispensador automático presente en varias familias de producto?", "opciones": ["Solo dispensa agua caliente", "Dispensa de forma automática detergente en polvo, líquido y suavizante en el momento correcto del ciclo", "Sirve para limpiar el filtro", "Aumenta la velocidad de centrifugado"], "correcta": 1, "retro": "El multidispensador automatiza la liberación de detergente en polvo, líquido y suavizante durante el ciclo correcto, ahorrando tiempo al usuario y mejorando el resultado de lavado."}, {"id": "R2-06", "ronda": 2, "pregunta": "¿Para qué tipo de cliente es especialmente relevante el ciclo especial para ropa de mascotas?", "opciones": ["Clientes que no tienen mascotas", "Hogares con mascotas, ya que ayuda a remover residuos de pelo de las prendas", "Solo aplica a ropa de bebé", "Clientes que buscan ciclos más cortos"], "correcta": 1, "retro": "El ciclo de ropa de mascotas es un gancho emocional poderoso: ayuda a remover residuos de pelo de las prendas, resolviendo un problema cotidiano para hogares con mascotas."}, {"id": "R2-09", "ronda": 2, "pregunta": "¿Cuál es el beneficio de la 'Tapa Edge' presente en varias familias Xpert?", "opciones": ["Solo es decorativa", "Diseño moderno sin bordes que soporta peso considerable, mejorando resistencia y estética", "Sirve para guardar detergente", "Reduce la capacidad de carga"], "correcta": 1, "retro": "La Tapa Edge tiene un diseño moderno sin bordes pensado para soportar peso y dar una sensación de mayor resistencia y calidad percibida frente al cliente."}, {"id": "R2-14", "ronda": 2, "pregunta": "¿Cuál es el beneficio de la conectividad WiFi y la app Whirlpool en ciertos modelos premium?", "opciones": ["Solo sirve para ver el clima", "Permite enviar instrucciones desde el celular para controlar y monitorear la lavadora a distancia", "Aumenta el ruido del motor", "Reduce la capacidad de lavado"], "correcta": 1, "retro": "La conectividad permite controlar y monitorear la lavadora desde el celular mediante la app Whirlpool, dando comodidad y control remoto al usuario, sin necesidad de estar presente."}, {"id": "R2-19", "ronda": 2, "pregunta": "¿Qué representa la consola con tecnología '¿Qué lavar?' y '¿Cómo lavar?' en modelos de panel touch?", "opciones": ["Un sistema de iluminación decorativa", "Controles intuitivos donde el cliente indica el tipo de prenda y la forma de lavar, optimizando tiempo y opciones de forma automática", "Un sistema exclusivo de secado", "Una función solo disponible en exhibición"], "correcta": 1, "retro": "Esta consola simplifica la decisión del usuario: arriba selecciona qué está lavando (tipo de prenda) y abajo cómo quiere lavarlo, y el equipo calcula automáticamente el tiempo y configuración óptima."}, {"id": "R2-20", "ronda": 2, "pregunta": "¿Qué hace especial al Sistema Dual Wash de la familia Xpert Dual Wash?", "opciones": ["Permite lavar dos cargas diferentes al mismo tiempo en canastas independientes, sin riesgo de mezclar o mancharse", "Solo funciona con una carga a la vez", "Es exclusivo para ropa blanca", "Elimina la necesidad de detergente"], "correcta": 0, "retro": "Dual Wash permite lavar dos cargas distintas simultáneamente gracias a sus canastas independientes, evitando el riesgo de que una prenda de color manche a una blanca, por ejemplo."}, {"id": "R2-32", "ronda": 2, "pregunta": "¿Cuál es el beneficio del sistema Sensor Dry Xpert presente en los Centros de Lavado?", "opciones": ["Detecta automáticamente cuándo la ropa llega al nivel óptimo de secado y detiene el ciclo para evitar sobre-secar", "Solo funciona para ropa de color", "Aumenta el tiempo de secado siempre", "Reemplaza al agitador"], "correcta": 0, "retro": "Sensor Dry Xpert detecta la humedad de la ropa y la temperatura del aire para determinar el punto óptimo de secado y detener el ciclo automáticamente, ahorrando tiempo y energía y evitando dañar las prendas por sobre-secado."}, {"id": "R2-34", "ronda": 2, "pregunta": "¿Qué hace al Motor Direct Drive —presente en lavadoras de carga frontal y lavasecadoras— especialmente atractivo para el cliente final, más allá de la instalación?", "opciones": ["Es más ruidoso pero más potente", "Opera de manera silenciosa, permite múltiples movimientos de lavado y velocidades de centrifugado, maximizando la eficiencia", "Solo funciona en modelos de gas", "Reduce la capacidad de carga del equipo"], "correcta": 1, "retro": "El motor Direct Drive, presente en lavadoras de carga frontal y lavasecadoras, opera silenciosamente y permite múltiples movimientos de lavado junto con distintas velocidades de centrifugado, dando un excelente desempeño de lavado con ahorro de energía."}, {"id": "R3-01", "ronda": 3, "pregunta": "Un cliente dice: 'Tengo miedo de que el agitador 2-en-1 se enganche con la ropa o la dañe'. ¿Cuál es la respuesta experta?", "opciones": ["Decirle que tiene razón, mejor compre un modelo sin agitador", "Explicar que el agitador está diseñado y probado para mover la ropa sin engancharla, y que además se puede retirar si prefiere lavar sin él", "Ignorar la objeción y cambiar de tema", "Decir que ese problema solo ocurre en otras marcas"], "correcta": 1, "retro": "Manejo de objeción clave: el diseño del agitador está probado para mover la ropa de forma segura, y al ser removible, el cliente tiene la libertad de usarlo o no según su preferencia. Convertir la objeción en una demostración física en el piso de venta es lo más efectivo."}, {"id": "R3-05", "ronda": 3, "pregunta": "En cuanto a garantía de motor, ¿cómo se posiciona Whirlpool frente a la competencia, que en algunos casos ofrece un esquema de garantía considerablemente más corto?", "opciones": ["Whirlpool ofrece menos años de garantía de motor", "Whirlpool ofrece una garantía de motor considerablemente más extensa, siendo un diferenciador clave de confianza a largo plazo", "Ambas marcas ofrecen exactamente la misma garantía", "La garantía de motor no es relevante para el cliente"], "correcta": 1, "retro": "La garantía extendida de motor de Whirlpool frente al esquema más corto que ofrece parte de la competencia es un argumento de confianza y durabilidad que pesa fuertemente en la decisión de compra, sobre todo en electrodomésticos de uso diario intensivo."}, {"id": "R3-10", "ronda": 3, "pregunta": "¿Qué evidencia técnica respalda la promesa de menor consumo de agua del lavado de Alta Eficiencia (HE) frente al lavado tradicional?", "opciones": ["Solo es una afirmación de marketing sin datos", "Pruebas comparativas de consumo de agua por ciclo entre lavado tradicional y Alta Eficiencia que muestran una reducción significativa", "El consumo de agua es idéntico en ambos sistemas", "Solo aplica en climas fríos"], "correcta": 1, "retro": "Existen pruebas comparativas documentadas que muestran cómo el sistema de Alta Eficiencia reduce significativamente el consumo de agua por ciclo frente al lavado tradicional. Además, las fichas o viñetas energéticas de los equipos Whirlpool muestran un menor consumo de energía anual en kilowatts, respaldando el argumento de que ahorrar agua también significa ahorrar energía: menos agua que mover y bombear equivale a menos kilowatts consumidos, todo documentado en la propia etiqueta del equipo."}, {"id": "R3-15", "ronda": 3, "pregunta": "Frente a un cliente que dice 'la competencia tiene más funciones en la app', ¿cómo responde un asesor experto en conectividad Whirlpool?", "opciones": ["Aceptar la derrota sin argumentar", "Mostrar las funciones reales de monitoreo y control remoto de la app Whirlpool disponibles en los modelos conectados, y enfocar la conversación en cuáles funciones resuelven la necesidad real del cliente", "Decir que la conectividad no sirve para nada", "Cambiar de tema inmediatamente"], "correcta": 1, "retro": "El manejo experto de esta objeción no es competir función por función en abstracto, sino demostrar en vivo las funciones reales de la app Whirlpool y conectar cada una con un beneficio concreto que le importe a ese cliente en particular."}, {"id": "R3-19", "ronda": 3, "pregunta": "¿Cuál es el argumento experto frente a la afirmación de un cliente: 'todas las lavadoras grandes consumen mucha agua, no importa la marca'?", "opciones": ["Estar de acuerdo sin más explicación", "Explicar que las tecnologías de Alta Eficiencia y ciclos como Xpert Water Saver están diseñadas justamente para romper esa relación directa entre capacidad alta y consumo alto de agua", "Decir que es imposible ahorrar agua en capacidades grandes", "Recomendar comprar la lavadora más pequeña disponible"], "correcta": 1, "retro": "El argumento experto desmonta la generalización: las tecnologías de Alta Eficiencia y ciclos como Xpert Water Saver están diseñadas específicamente para que una mayor capacidad no implique necesariamente mayor consumo de agua por kilo de ropa lavado. Y como el agua que se ahorra es agua que el motor y la bomba ya no tienen que mover, ese ahorro de agua se traduce también en menor consumo de kilowatts, beneficiando el recibo de luz del cliente."}, {"id": "R3-21", "ronda": 3, "pregunta": "¿Qué argumento técnico se usa frente a la duda 'el llenado manual con cubeta suena anticuado, ¿por qué lo siguen ofreciendo?'", "opciones": ["Es una solución de diseño deliberada y obsoleta que se debería quitar", "Es una solución práctica y deliberada para zonas con baja presión de agua, garantizando que el cliente nunca se quede sin poder lavar, algo que sistemas totalmente automáticos no resuelven", "Solo se ofrece porque es más barato de fabricar", "No tiene ninguna justificación técnica real"], "correcta": 1, "retro": "El llenado manual no es una limitación sino una solución deliberada de continuidad de servicio para hogares con baja presión de agua, un escenario común en varias zonas de la región, que los sistemas totalmente automáticos de algunos competidores no resuelven."}, {"id": "R3-22", "ronda": 3, "pregunta": "Un cliente premium pregunta por qué elegir el Centro de Lavado Whirlpool frente a comprar lavadora y secadora por separado de la competencia. ¿Cuál es el argumento experto de espacio y capacidad?", "opciones": ["No hay ninguna ventaja, es lo mismo", "El Centro de Lavado combina ambas funciones en un gabinete compacto que cabe en espacios reducidos, ofreciendo además la mayor capacidad de lavado en su categoría frente a soluciones combinadas equivalentes", "Siempre es más caro sin ningún beneficio adicional", "Solo sirve para apartamentos sin lavandería"], "correcta": 1, "retro": "El argumento experto combina dos beneficios: ahorro de espacio físico (gabinete compacto) y la mayor capacidad de lavado de su categoría, una combinación difícil de igualar comprando dos equipos separados de otra marca."}, {"id": "R3-26", "ronda": 3, "pregunta": "¿Cuál es el argumento experto frente a 'todas las marcas dicen que ahorran agua, eso ya no me convence'?", "opciones": ["Aceptar que es verdad y no insistir en el ahorro de agua", "Diferenciar el discurso genérico de marketing del respaldo técnico: mencionar que las tecnologías como Xpert Water Saver están sustentadas en pruebas comparativas medibles, no solo en una etiqueta de marketing", "Decir que ningún producto ahorra agua realmente", "Cambiar el argumento únicamente hacia el diseño estético"], "correcta": 1, "retro": "El asesor experto distingue su discurso del ruido genérico del mercado apoyándose en evidencia comparativa real (pruebas de consumo de agua), no solo repitiendo la palabra 'ahorro' como cualquier otra marca."}, {"id": "R3-31", "ronda": 3, "pregunta": "Un cliente experto pregunta la diferencia funcional entre 'garantía de motor', 'garantía de panel' y 'garantía total' del producto. ¿Cuál es la explicación correcta?", "opciones": ["Las tres son exactamente lo mismo con distinto nombre", "Cada garantía cubre un componente o alcance distinto del equipo (el motor, el panel de control y el producto en general), cada una con su propia duración, y el asesor debe explicarlas por separado para evitar confusión", "Solo existe una garantía general, las otras no aplican en la práctica", "La garantía de panel siempre es más larga que la de motor"], "correcta": 1, "retro": "Es fundamental que el asesor explique con claridad que cada garantía cubre un alcance distinto (motor, panel, producto general) con su propia duración, evitando que el cliente asuma que todo el equipo tiene la misma cobertura que el motor."}, {"id": "R3-32", "ronda": 3, "pregunta": "¿Cuál es el argumento experto frente a 'compraré el modelo más barato de cualquier marca porque todas lavan igual'?", "opciones": ["Aceptar la afirmación sin contraargumentar", "Explicar que las diferencias reales están en tecnología de agitador, garantía, ciclos especiales y eficiencia, factores que impactan directamente en resultados de limpieza, durabilidad y ahorro a largo plazo, no visibles a simple vista en el precio de etiqueta", "Decir que el precio es lo único que importa", "Confirmar que efectivamente todas las lavadoras son idénticas"], "correcta": 1, "retro": "Este es el argumento de cierre más importante para un asesor experto: desmontar la idea de que 'todo lava igual' mostrando diferencias reales y medibles en tecnología, garantía y eficiencia que no son visibles en una comparación superficial de precio."}, {"id": "SKU-29", "ronda": 1, "pregunta": "El modelo 8MWTW2054WRM de 20 kg pertenece a la familia 2-en-1, junto al 8MWTW2654WRM de 26 kg. ¿Qué deben verificar ambos en la instalación respecto al llenado de agua?", "opciones": ["Solo aceptan llenado automático", "Permiten llenado manual con cubeta como alternativa ante baja presión", "Requieren doble tubería de agua caliente", "No requieren ninguna conexión de agua"], "correcta": 1, "retro": "Tanto el 8MWTW2054WRM como el resto de la familia 2-en-1 permiten llenado manual con cubeta, garantizando que el ciclo continúe sin depender completamente de la presión de la red hidráulica del hogar."}, {"id": "SKU-30", "ronda": 2, "pregunta": "¿Qué tienen en común el 8MWTW2054WRM (20 kg) y el 8MWTW2654WRM (26 kg) en cuanto a su sistema de agitador?", "opciones": ["Ninguno tiene agitador", "Ambos comparten el agitador Xpert Dual removible 2-en-1, único en la industria", "Solo el de 26 kg tiene agitador removible", "Ambos usan agitador fijo sin opción de retirarlo"], "correcta": 1, "retro": "Tanto el 8MWTW2054WRM de 20 kg como el 8MWTW2654WRM de 26 kg comparten el agitador Xpert Dual removible, único en la industria, que permite personalizar cualquier carga según la necesidad del cliente."}, {"id": "R1-29", "ronda": 1, "pregunta": "¿Por qué es tan importante que la manguera de drenaje quede instalada a una altura de aproximadamente 1 metro?", "opciones": ["Es solo una recomendación estética, no afecta el funcionamiento", "Si no tiene esa altura, el agua puede drenarse sola después del llenado, afectando el lavado y la satisfacción del cliente", "Mientras más alta esté la manguera, mejor funciona el equipo sin límite", "La altura de la manguera solo afecta el nivel de ruido"], "correcta": 1, "retro": "Si la manguera de drenaje no queda a la altura recomendada de aproximadamente 1 metro, el agua puede drenarse por sí sola después del llenado (efecto sifón), dejando al equipo sin el agua necesaria para lavar correctamente. Esto genera una experiencia insatisfactoria para el cliente que parece un problema del producto, cuando en realidad es un error de instalación."}, {"id": "R2-39", "ronda": 2, "pregunta": "¿Cuántos movimientos de lavado ofrece cada tipo de agitador largo: Single Action, Double Action y Triple Action?", "opciones": ["Single Action 6, Double Action 8, Triple Action 10", "Single Action 4, Double Action 6, Triple Action 8", "Los tres ofrecen exactamente los mismos movimientos", "Single Action 10, Double Action 8, Triple Action 6"], "correcta": 0, "retro": "La escala correcta es: Single Action con 6 movimientos, Double Action con 8 movimientos y Triple Action con 10 movimientos. Cada nivel agrega 2 movimientos adicionales, aumentando progresivamente el poder de limpieza para cargas con suciedad más difícil."}, {"id": "R3-35", "ronda": 3, "pregunta": "Un cliente que trabaja en construcción necesita lavar ropa con tierra y grasa muy difícil de remover. Dentro de la familia de agitador largo, ¿qué tecnología le recomendarías y por qué?", "opciones": ["Single Action, porque con 6 movimientos es suficiente para cualquier tipo de suciedad", "Double Action (8 movimientos) o Triple Action (10 movimientos), ya que ambos generan la fuerza mecánica necesaria para remover suciedad pesada; Triple Action es la opción máxima para los casos más difíciles", "No hay ninguna diferencia entre las tres opciones para este caso", "Recomendar un modelo sin agitador, ya que todos los agitadores son iguales"], "correcta": 1, "retro": "Para suciedad pesada como tierra y grasa, los agitadores Double Action (8 movimientos) y Triple Action (10 movimientos) son los ideales: generan suficiente fuerza mecánica para subir y bajar la ropa repetidamente, removiendo la suciedad difícil. Triple Action, con 10 movimientos, es la opción máxima de la familia; ambos superan claramente al Single Action de 6 movimientos, que está pensado para cargas de suciedad ligera."}, {"id": "R3-36", "ronda": 3, "pregunta": "Un cliente pregunta: '¿Por qué dicen que ahorrar agua también ahorra electricidad? Son dos cosas distintas'. ¿Cuál es la explicación experta correcta?", "opciones": ["Son completamente independientes, no existe ninguna relación entre ambas", "Porque mover y bombear el agua requiere trabajo del motor y la bomba; al usar menos agua, ese trabajo se reduce, y por lo tanto el consumo de kilowatts también baja", "El ahorro de electricidad ocurre solo si se usa agua fría, sin relación con la cantidad de agua", "Ahorrar agua siempre aumenta el consumo eléctrico, no lo reduce"], "correcta": 1, "retro": "Esta es una de las explicaciones más valiosas que un asesor experto puede dar: el agua no se mueve sola. Bombearla y hacerla circular requiere trabajo eléctrico del motor y la bomba. Cuando una tecnología como Xpert Water Saver reduce la cantidad de agua usada, automáticamente reduce ese trabajo, y por lo tanto el consumo de kilowatts baja también. Así, el ahorro de agua y el ahorro de energía no son dos promesas separadas, sino una sola causa con dos beneficios visibles en el recibo del hogar."}]</script>

<script>
// ============================================================
// AUDIO RETRO ARCADE — música animada + efectos (Web Audio API)
// ============================================================

let AUDIO_CTX = null;
let AUDIO_ACTIVO = true;
let MUSICA_NODOS = null;

function getAudioCtx(){
  if(!AUDIO_CTX){
    AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();
  }
  return AUDIO_CTX;
}

function reanudarAudioSiNecesario(){
  const ctx = getAudioCtx();
  if(ctx.state === 'suspended'){
    ctx.resume();
  }
}

function sfxAcierto(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.07;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.09, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.2);
  });
}

function sfxError(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.35);
  gain.gain.setValueAtTime(0.09, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.36);
}

function sfxVictoria(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [392, 523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.1;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.12, t0+0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.32);
  });
}

// ---- Música de fondo animada: melodía + bajo + percusión simple, en loop ----
// Patrón inspirado en arcade retro: bajo marcando el pulso, melodía sincopada arriba, hi-hat ligero.

const MUSICA_BAJO    = [196, 196, 246.94, 196, 220, 220, 261.63, 220];
const MUSICA_MELODIA = [392, 0, 523.25, 466.16, 392, 0, 440, 392, 523.25, 0, 587.33, 523.25, 440, 0, 392, 0];
const MUSICA_TEMPO_PASO = 0.16; // segundos por paso de melodia (rapido, animado)

function iniciarMusicaFondo(){
  if(!AUDIO_ACTIVO) return;
  detenerMusicaFondo();
  const ctx = getAudioCtx();
  const master = ctx.createGain();
  master.gain.value = 0.065;
  master.connect(ctx.destination);

  let pasoMelodia = 0;
  let pasoBajo = 0;

  function programarPasoMelodia(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_MELODIA[pasoMelodia % MUSICA_MELODIA.length];
    if(freq > 0){
      const osc = ctxNow.createOscillator();
      const gain = ctxNow.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t0 = ctxNow.currentTime;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.linearRampToValueAtTime(0.07, t0+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*0.85);
      osc.connect(gain); gain.connect(master);
      osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO);
    }
    // hi-hat ligero en pasos pares
    if(pasoMelodia % 2 === 0){
      const bufferSize = ctxNow.sampleRate * 0.02;
      const buffer = ctxNow.createBuffer(1, bufferSize, ctxNow.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1)*0.3; }
      const noise = ctxNow.createBufferSource();
      noise.buffer = buffer;
      const hatGain = ctxNow.createGain();
      hatGain.gain.value = 0.025;
      noise.connect(hatGain); hatGain.connect(master);
      noise.start();
    }
    pasoMelodia++;
  }

  function programarPasoBajo(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_BAJO[pasoBajo % MUSICA_BAJO.length];
    const osc = ctxNow.createOscillator();
    const gain = ctxNow.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctxNow.currentTime;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.08, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*1.7);
    osc.connect(gain); gain.connect(master);
    osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO*2);
    pasoBajo++;
  }

  const intervalMelodia = setInterval(programarPasoMelodia, MUSICA_TEMPO_PASO*1000);
  const intervalBajo = setInterval(programarPasoBajo, MUSICA_TEMPO_PASO*2000);
  MUSICA_NODOS = { master, intervalMelodia, intervalBajo };
  programarPasoMelodia();
  programarPasoBajo();
}

function detenerMusicaFondo(){
  if(MUSICA_NODOS){
    clearInterval(MUSICA_NODOS.intervalMelodia);
    clearInterval(MUSICA_NODOS.intervalBajo);
    try{ MUSICA_NODOS.master.disconnect(); }catch(e){}
    MUSICA_NODOS = null;
  }
}

function toggleAudio(){
  AUDIO_ACTIVO = !AUDIO_ACTIVO;
  if(!AUDIO_ACTIVO){
    detenerMusicaFondo();
  } else {
    reanudarAudioSiNecesario();
    iniciarMusicaFondo();
  }
  return AUDIO_ACTIVO;
}

<script>
// ============================================================
// DESAFÍO DE LAVADORAS — Lógica de la aplicación
// ============================================================

const RONDA_INFO = {
  1: { nombre: "Ronda 1 · Experto en Instalaciones", cantidad: 12, intro: "Antes de vender, hay que instalar bien. Responde sobre conexión eléctrica, nivelación y los riesgos de una mala instalación." },
  2: { nombre: "Ronda 2 · Producto Nivel Intermedio", cantidad: 18, intro: "Conoce a fondo las tecnologías, los SKU estratégicos y los beneficios de cada familia de lavadoras Whirlpool." },
  3: { nombre: "Ronda 3 · Experto Whirlpool", cantidad: 15, intro: "El nivel más exigente: comparativos frente a la competencia y manejo de objeciones en el punto de venta." }
};

const PUNTOS_POR_ACIERTO = 10;

let ESTADO = {
  nombre: "",
  pais: "",
  intento: 1,
  rondaActual: 1,
  preguntasSesion: { 1: [], 2: [], 3: [] },
  indiceEnRonda: 0,
  score: 0,
  correctas: 0,
  totalPreguntas: 0,
  respondida: false,
  resultadosPorRonda: { 1: 0, 2: 0, 3: 0 }
};

function $(sel){ return document.querySelector(sel); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function mezclarArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function tomarAlAzar(arr, n){
  return mezclarArray(arr).slice(0, Math.min(n, arr.length));
}

function cargarBancoPreguntas(){
  const raw = document.getElementById('datos-preguntas').textContent;
  return JSON.parse(raw);
}

function prepararSesion(){
  const banco = cargarBancoPreguntas();
  const porRonda = { 1: [], 2: [], 3: [] };
  banco.forEach(p => porRonda[p.ronda].push(p));

  ESTADO.preguntasSesion[1] = tomarAlAzar(porRonda[1], RONDA_INFO[1].cantidad);
  ESTADO.preguntasSesion[2] = tomarAlAzar(porRonda[2], RONDA_INFO[2].cantidad);
  ESTADO.preguntasSesion[3] = tomarAlAzar(porRonda[3], RONDA_INFO[3].cantidad);

  ESTADO.totalPreguntas = RONDA_INFO[1].cantidad + RONDA_INFO[2].cantidad + RONDA_INFO[3].cantidad;
  ESTADO.score = 0;
  ESTADO.correctas = 0;
  ESTADO.rondaActual = 1;
  ESTADO.indiceEnRonda = 0;
  ESTADO.resultadosPorRonda = { 1: 0, 2: 0, 3: 0 };
}

// ---------- localStorage: identidad + historial local ----------
const LS_KEY = "desafio_lavadoras_v1";

function leerLocal(){
  try{
    return JSON.parse(localStorage.getItem(LS_KEY)) || {};
  }catch(e){ return {}; }
}
function guardarLocal(obj){
  const actual = leerLocal();
  const nuevo = Object.assign({}, actual, obj);
  localStorage.setItem(LS_KEY, JSON.stringify(nuevo));
}

function obtenerIntentosPrevios(nombre){
  const data = leerLocal();
  const intentos = (data.intentos && data.intentos[MODULO_ACTUAL] && data.intentos[MODULO_ACTUAL][nombre.toLowerCase()]) || [];
  return intentos;
}

function registrarIntentoLocal(nombre, resultado){
  const data = leerLocal();
  if(!data.intentos) data.intentos = {};
  if(!data.intentos[MODULO_ACTUAL]) data.intentos[MODULO_ACTUAL] = {};
  const key = nombre.toLowerCase();
  if(!data.intentos[MODULO_ACTUAL][key]) data.intentos[MODULO_ACTUAL][key] = [];
  data.intentos[MODULO_ACTUAL][key].push(resultado);
  guardarLocal(data);
}

// ---------- Envío a backend (Google Sheets) ----------
async function enviarResultado(payload){
  if(!BACKEND_URL){
    return { ok:false, local:true };
  }
  try{
    const resp = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    return data;
  }catch(err){
    console.error("Error al enviar resultado:", err);
    return { ok:false, error: err.message };
  }
}

async function obtenerRanking(){
  if(!BACKEND_URL) return null;
  try{
    const resp = await fetch(BACKEND_URL + "?action=ranking");
    const data = await resp.json();
    return data.ok ? data.ranking : null;
  }catch(err){
    return null;
  }
}

function renderPregunta(){
  const ronda = ESTADO.rondaActual;
  const preguntas = ESTADO.preguntasSesion[ronda];
  const idx = ESTADO.indiceEnRonda;
  const pregunta = preguntas[idx];

  const totalEnRonda = preguntas.length;
  const numGlobal = sumaPreguntasRondasPrevias(ronda) + idx + 1;
  const pctGlobal = Math.round((numGlobal-1) / ESTADO.totalPreguntas * 100);

  const cont = $('#pantalla-app');
  cont.innerHTML = `
    <div class="hud">
      <span class="ronda-tag">${RONDA_INFO[ronda].nombre}</span>
      <div class="progreso-wrap">
        <div class="barra-progreso"><div style="width:${pctGlobal}%"></div></div>
      </div>
      <span class="score-box">⚡ ${ESTADO.score} pts</span>
      <button class="btn-audio-cuestionario" id="btn-audio-cuestionario">${AUDIO_ACTIVO ? '🔊' : '🔇'}</button>
    </div>
    <div class="pregunta-num">Pregunta ${idx+1} de ${totalEnRonda} · (${numGlobal}/${ESTADO.totalPreguntas} total)</div>
    <div class="pregunta-texto">${escapeHtml(pregunta.pregunta)}</div>
    <div class="opciones" id="lista-opciones"></div>
    <div id="zona-retro"></div>
    <div class="siguiente-wrap" id="zona-siguiente"></div>
  `;

  const btnAudio = document.getElementById('btn-audio-cuestionario');
  if(btnAudio){
    btnAudio.addEventListener('click', () => {
      const activo = toggleAudio();
      btnAudio.textContent = activo ? '🔊' : '🔇';
    });
  }


  const listaOpciones = document.getElementById('lista-opciones');
  pregunta.opciones.forEach((texto, i) => {
    const btnOp = el('button', 'opcion', escapeHtml(texto));
    btnOp.dataset.idx = i;
    btnOp.addEventListener('click', () => onResponder(i, pregunta));
    listaOpciones.appendChild(btnOp);
  });

  ESTADO.respondida = false;
}

function sumaPreguntasRondasPrevias(rondaActual){
  let suma = 0;
  for(let r=1; r<rondaActual; r++){
    suma += ESTADO.preguntasSesion[r].length;
  }
  return suma;
}

function onResponder(indiceElegido, pregunta){
  if(ESTADO.respondida) return;
  ESTADO.respondida = true;

  const esCorrecta = indiceElegido === pregunta.correcta;
  if(esCorrecta){
    ESTADO.score += PUNTOS_POR_ACIERTO;
    ESTADO.correctas += 1;
    ESTADO.resultadosPorRonda[ESTADO.rondaActual] += 1;
  }

  // Marcar visualmente las opciones
  const botones = document.querySelectorAll('#lista-opciones .opcion');
  botones.forEach(btn => {
    btn.disabled = true;
    const i = Number(btn.dataset.idx);
    if(i === pregunta.correcta){
      btn.classList.add('correcta');
    }
    if(i === indiceElegido && !esCorrecta){
      btn.classList.add('incorrecta');
    }
  });

  // Retroalimentación
  const zonaRetro = document.getElementById('zona-retro');
  zonaRetro.innerHTML = `
    <div class="retro-box ${esCorrecta ? 'ok' : 'no'}">
      <span class="etiqueta">${esCorrecta ? '✓ Correcto' : '✕ No es la respuesta correcta'}</span>
      ${escapeHtml(pregunta.retro)}
    </div>
  `;

  // Botón siguiente
  const zonaSig = document.getElementById('zona-siguiente');
  const esUltimaDeRonda = ESTADO.indiceEnRonda === ESTADO.preguntasSesion[ESTADO.rondaActual].length - 1;
  const esUltimaRonda = ESTADO.rondaActual === 3;

  let textoBoton = "Siguiente pregunta →";
  if(esUltimaDeRonda && !esUltimaRonda) textoBoton = `Finalizar ${RONDA_INFO[ESTADO.rondaActual].nombre.split('·')[0].trim()} →`;
  if(esUltimaDeRonda && esUltimaRonda) textoBoton = "Ver mis resultados →";

  const btnSiguiente = el('button','btn', textoBoton);
  btnSiguiente.id = 'btn-siguiente-pregunta';
  zonaSig.appendChild(btnSiguiente);
  btnSiguiente.addEventListener('click', avanzar);
}

function avanzar(){
  const ronda = ESTADO.rondaActual;
  const esUltimaDeRonda = ESTADO.indiceEnRonda === ESTADO.preguntasSesion[ronda].length - 1;

  if(esUltimaDeRonda){
    if(ronda < 3){
      renderTransicionRonda(ronda + 1, false);
    } else {
      finalizarJuego();
    }
  } else {
    ESTADO.indiceEnRonda += 1;
    renderPregunta();
  }
}

    <label class="campo-label" for="input-trofeo-apellido">Apellido</label>
    <input type="text" id="input-trofeo-apellido" placeholder="Ej. Chanquin" maxlength="20" autocomplete="off">

    <div style="margin-top:20px;">
      <video id="video-camara" autoplay playsinline style="width:100%; border-radius:12px; background:#000; display:none; max-height:320px; object-fit:cover;"></video>
      <canvas id="canvas-foto" style="display:none;"></canvas>
      <img id="preview-foto" style="display:none; width:100%; border-radius:12px; max-height:320px; object-fit:cover;">
    </div>

    <div id="zona-botones-camara" style="margin-top:16px; display:flex; gap:10px;">
      <button class="btn" id="btn-abrir-camara">📷 Activar cámara</button>
    </div>

    <div id="zona-tarjeta-final" style="margin-top:20px;"></div>

    <div class="acciones-final" style="margin-top:22px;">
      <button class="btn secundario" id="btn-omitir-trofeo">Omitir y volver al menú</button>
    </div>
  `;

  document.getElementById('btn-abrir-camara').addEventListener('click', activarCamara);
  document.getElementById('btn-omitir-trofeo').addEventListener('click', () => {
    detenerCamara();
    renderSeleccionIntento();
  });
}

async function activarCamara(){
  const video = document.getElementById('video-camara');
  const zonaBotones = document.getElementById('zona-botones-camara');
  try{
    CAMARA_STREAM = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    video.srcObject = CAMARA_STREAM;
    video.style.display = 'block';
    zonaBotones.innerHTML = `<button class="btn" id="btn-tomar-foto">📸 Tomar foto</button>`;
    document.getElementById('btn-tomar-foto').addEventListener('click', tomarFoto);
  }catch(err){
    zonaBotones.innerHTML = `<div class="retro-box no"><span class="etiqueta">No se pudo acceder a la cámara</span>Verifica los permisos de cámara en tu navegador, o continúa sin foto.</div>`;
  }
}

function detenerCamara(){
  if(CAMARA_STREAM){
    CAMARA_STREAM.getTracks().forEach(t => t.stop());
    CAMARA_STREAM = null;
  }
}

function tomarFoto(){
  const video = document.getElementById('video-camara');
  const canvas = document.getElementById('canvas-foto');
  const preview = document.getElementById('preview-foto');

  const tam = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = 600; canvas.height = 750; // proporción retrato tipo Panini

  const ctx = canvas.getContext('2d');
  // Recorte centrado tipo "retrato" desde el video cuadrado/horizontal
  const srcW = video.videoWidth, srcH = video.videoHeight;
  const targetRatio = 600/750;
  let cropW = srcH * targetRatio;
  let cropH = srcH;
  if(cropW > srcW){ cropW = srcW; cropH = srcW / targetRatio; }
  const sx = (srcW - cropW)/2;
  const sy = (srcH - cropH)/2;

  // Espejar horizontalmente (efecto selfie natural)
  ctx.translate(canvas.width, 0);
  ctx.scale(-1,1);
  ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);
  ctx.setTransform(1,0,0,1,0,0);

  FOTO_CAPTURADA_DATAURL = canvas.toDataURL('image/png');

  video.style.display = 'none';
  preview.src = FOTO_CAPTURADA_DATAURL;
  preview.style.display = 'block';
  detenerCamara();

  document.getElementById('zona-botones-camara').innerHTML = `
    <button class="btn secundario" id="btn-repetir-foto">🔄 Repetir foto</button>
    <button class="btn" id="btn-generar-tarjeta">✨ Generar mi tarjeta</button>
  `;
  document.getElementById('btn-repetir-foto').addEventListener('click', () => {
    preview.style.display = 'none';
    document.getElementById('zona-tarjeta-final').innerHTML = '';
    activarCamara();
  });
  document.getElementById('btn-generar-tarjeta').addEventListener('click', generarTarjetaPanini);
}

async function generarTarjetaPanini(){
  const nombre = document.getElementById('input-trofeo-nombre').value.trim() || 'Asesor';
  const apellido = document.getElementById('input-trofeo-apellido').value.trim() || 'Whirlpool';

  if(!FOTO_CAPTURADA_DATAURL){
    alert('Primero toma una foto.');
    return;
  }

  const pct = Math.round((ESTADO.correctas / ESTADO.totalPreguntas) * 100);
  const tier = obtenerTierMedalla(pct);

  const W = 800, H = 1000;
  const canvasFinal = document.createElement('canvas');
  canvasFinal.width = W; canvasFinal.height = H;
  const ctx = canvasFinal.getContext('2d');

  // 1. Fondo dorado Panini
  const fondo = await cargarImagen('data:image/png;base64,' + FONDO_PANINI_B64);
  ctx.drawImage(fondo, 0, 0, W, H);

  // 2. Foto del asesor (rectangular grande, parte superior)
  const foto = await cargarImagen(FOTO_CAPTURADA_DATAURL);
  const fotoX = 60, fotoY = 70, fotoW = W-120, fotoH = 560;
  ctx.save();
  redondearRect(ctx, fotoX, fotoY, fotoW, fotoH, 18);
  ctx.clip();
  dibujarImagenCover(ctx, foto, fotoX, fotoY, fotoW, fotoH);
  ctx.restore();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#ffffff';
  redondearRect(ctx, fotoX, fotoY, fotoW, fotoH, 18);
  ctx.stroke();

  // 3. Numero "26" decorativo estilo Panini, esquina superior derecha
  ctx.font = "800 64px Inter, sans-serif";
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'right';
  ctx.fillText('26', W-40, 60);

  // 4. Medalla (esquina inferior derecha de la foto)
  const medalla = await cargarImagen('data:image/png;base64,' + tier.b64Var);
  const medW = 110, medH = 110*(medalla.height/medalla.width);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 10;
  ctx.drawImage(medalla, W-60-medW+0, fotoY+fotoH-medH+20, medW, medH);
  ctx.restore();

  // 5. Logo Whirlpool Academy (esquina inferior izquierda de la foto, fondo oscuro para contraste)
  const logo = await cargarImagen(logoIsotipoDataUrl());
  const logoW = 522, logoH = 522*(logo.height/logo.width);
  const logoX = fotoX+18, logoY = fotoY+fotoH-logoH-18;
  ctx.save();
  redondearRect(ctx, logoX-10, logoY-8, logoW+20, logoH+16, 8);
  ctx.fillStyle = 'rgba(10,10,14,0.78)';
  ctx.fill();
  ctx.drawImage(logo, logoX, logoY, logoW, logoH);
  ctx.restore();

  // 6. Franja de nombre (debajo de la foto, estilo Panini)
  const franjaY = fotoY+fotoH+24;
  ctx.fillStyle = 'rgba(15,17,23,0.92)';
  redondearRect(ctx, fotoX, franjaY, fotoW, 78, 12);
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = "800 30px Inter, sans-serif";
  ctx.fillText(`${nombre.toUpperCase()} ${apellido.toUpperCase()}`, W/2, franjaY+34);
  ctx.font = "600 15px Inter, sans-serif";
  ctx.fillStyle = '#f5c428';
  ctx.fillText(`CRACK MUNDIALISTA · DESAFÍO LAVADO`, W/2, franjaY+60);

  // 7. Etiqueta de tier (Jugador Oro/Plata/Bronce) arriba de la franja de nombre
  ctx.font = "800 17px Inter, sans-serif";
  ctx.fillStyle = '#1a1505';
  const tierW = ctx.measureText(tier.etiqueta).width + 40;
  const tierX = fotoX+fotoW-tierW-10, tierY = franjaY-46;
  ctx.fillStyle = '#f5c428';
  redondearRect(ctx, tierX, tierY, tierW, 34, 17);
  ctx.fill();
  ctx.fillStyle = '#1a1505';
  ctx.textAlign = 'center';
  ctx.fillText(tier.etiqueta, tierX+tierW/2, tierY+23);

  // 8. Footer Panini-style: barra de marca Whirlpool
  const colores = ['#c44fb0','#f5c428','#161a4a','#c11f35'];
  const segW = W/colores.length;
  colores.forEach((c,i) => {
    ctx.fillStyle = c;
    ctx.fillRect(i*segW, H-14, segW, 14);
  });

  const dataUrlFinal = canvasFinal.toDataURL('image/png');

  const zona = document.getElementById('zona-tarjeta-final');
  zona.innerHTML = `
    <div style="text-align:center;">
      <img src="${dataUrlFinal}" style="width:100%; max-width:380px; border-radius:14px; box-shadow:0 12px 30px rgba(0,0,0,0.5);">
      <div style="margin-top:16px;">
        <a class="btn" id="btn-descargar-tarjeta" download="tarjeta-crack-mundialista-${nombre}.png" href="${dataUrlFinal}">⬇️ Descargar mi tarjeta</a>
      </div>
    </div>
  `;
}

function redondearRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function dibujarImagenCover(ctx, img, x, y, w, h){
  const ratio = Math.max(w/img.width, h/img.height);
  const nw = img.width*ratio, nh = img.height*ratio;
  const nx = x + (w-nw)/2;
  const ny = y + (h-nh)/2;
  ctx.drawImage(img, nx, ny, nw, nh);
}

function cargarImagen(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
