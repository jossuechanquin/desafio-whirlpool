#overlay-oscuro{
  position:fixed; inset:0; z-index:0;
  background: linear-gradient(180deg, rgba(8,8,12,0.55) 0%, rgba(8,8,12,0.88) 35%, rgba(8,8,12,0.94) 100%);
}
.balon-decorativo{
  position:absolute; width:30px; height:30px; opacity:0.45; z-index:1; pointer-events:none;
}

.barra-marca{ height:6px; display:flex; width:100%; position:relative; z-index:2; }
.barra-marca div{flex:1;}
.b1{background:var(--magenta);} .b2{background:var(--dorado);} .b3{background:var(--navy);} .b4{background:var(--rojo);}

.contenedor{ max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; position:relative; z-index:2; }

header.top{ display:flex; align-items:center; gap:14px; margin-bottom: 22px; }
header.top img{ width:160px; filter: drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }

.pantalla{
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 28px;
  box-shadow: 0 18px 50px rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
}

.hero-isotipo{ display:flex; justify-content:center; margin-bottom: 14px; }
.hero-isotipo img{ width: 230px; filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4)); }

.intro-titulo{ text-align:center; font-size: 26px; font-weight: 800; margin: 6px 0 6px; line-height:1.3; }
.intro-sub{ text-align:center; color: var(--texto-tenue); font-size: 14.5px; margin-bottom: 26px; line-height:1.5; }

label.campo-label{ display:block; font-size: 12.5px; color: var(--texto-tenue); margin-bottom: 8px; text-transform:uppercase; letter-spacing: 1px; }
input[type="text"]{
  width: 100%; background: var(--negro2); border: 1px solid #34343b; color: var(--texto);
  padding: 14px 16px; border-radius: 10px; font-size: 15px; outline:none;
}
input[type="text"]:focus{ border-color: var(--dorado); }

.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px; width:100%;
  margin-top: 18px; background: var(--dorado); color: #1a1505; font-weight: 800; font-size: 15px;
  border:none; padding: 15px 18px; border-radius: 10px; cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease; text-decoration:none;
}
.btn:hover{ transform: translateY(-1px); box-shadow: 0 8px 18px rgba(245,196,40,0.25); }
.btn:active{ transform: translateY(0); }
.btn.secundario{ background: transparent; color: var(--texto); border: 1px solid #3a3a42; }
.btn.chico{ width:auto; padding:10px 16px; font-size:13px; margin-top:0;}
.btn:disabled{ opacity:.45; cursor:not-allowed; }

.opciones-intento{ display:flex; flex-direction:column; gap:12px; margin-top: 18px; }
.intento-card{
  background: var(--negro2); border:1px solid #2c2c32; border-radius:12px; padding:16px 18px;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
}
.intento-card .info-i strong{ display:block; font-size:14px; margin-bottom:3px;}
.intento-card .info-i span{ font-size:12px; color:var(--texto-tenue);}

.hud{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
.hud .ronda-tag{ font-size: 10.5px; background: var(--negro2); border:1px solid #34343b; padding: 7px 12px; border-radius: 999px; color: var(--dorado); letter-spacing:0.5px; }
.hud .progreso-wrap{ flex:1; min-width:160px; }
.hud .barra-progreso{ height:8px; background: var(--negro2); border-radius:999px; overflow:hidden; border:1px solid #2c2c32; }
.hud .barra-progreso > div{ height:100%; background: linear-gradient(90deg, var(--dorado), #fff3b0); transition: width .3s ease; }
.hud .score-box{ font-size: 13px; font-weight:700; background: var(--negro2); border:1px solid #34343b; padding:7px 14px; border-radius:999px; }

.btn-audio-cuestionario{ background: var(--negro2); border:1px solid #34343b; color: var(--texto); border-radius:8px; width:34px; height:34px; font-size:14px; cursor:pointer; }

.pregunta-num{ font-size:12px; color:var(--texto-tenue); margin-bottom:8px; }
.pregunta-texto{ font-size: 18px; font-weight:700; line-height:1.4; margin-bottom: 22px;}

.opciones{ display:flex; flex-direction:column; gap:11px; }
.opcion{
  background: var(--negro2); border: 1.5px solid #34343b; color: var(--texto); text-align:left;
  padding: 14px 16px; border-radius: 10px; font-size: 14.5px; cursor:pointer; transition: all .15s ease; line-height:1.4;
}
.opcion:hover:not(:disabled){ border-color: var(--dorado); background:#211f15; }
.opcion:disabled{ cursor:default; }
.opcion.correcta{ border-color: var(--correcto); background: rgba(62,207,110,0.12); }
.opcion.incorrecta{ border-color: var(--incorrecto); background: rgba(226,71,58,0.12); }

.retro-box{ margin-top:20px; padding:16px 18px; border-radius: 10px; font-size: 13.5px; line-height:1.55; border-left: 4px solid var(--dorado); background: var(--negro2); }
.retro-box.ok{ border-left-color: var(--correcto); }
.retro-box.no{ border-left-color: var(--incorrecto); }
.retro-box .etiqueta{ font-weight:800; display:block; margin-bottom:6px; font-size:12.5px; letter-spacing:0.5px; text-transform:uppercase; }
.retro-box.ok .etiqueta{ color: var(--correcto); }
.retro-box.no .etiqueta{ color: var(--incorrecto); }

.siguiente-wrap{ margin-top:20px; }

.transicion{ text-align:center; padding: 30px 10px; }
.transicion .num-ronda{ font-size: 11px; color: var(--dorado); letter-spacing:2px; margin-bottom:10px; }
.transicion h2{ font-size:22px; margin-bottom:10px; }
.transicion p{ color:var(--texto-tenue); font-size:14px; margin-bottom: 22px; line-height:1.6;}

.resultado-score{ text-align:center; margin: 8px 0 24px; }
.resultado-score .num{ font-size: 52px; font-weight:800; color: var(--dorado); line-height:1; }
.resultado-score .lbl{ color:var(--texto-tenue); font-size:13px; margin-top:6px; }
.desglose{ display:grid; grid-template-columns: repeat(3,1fr); gap:10px; margin: 18px 0 22px; }
.desglose .item{ background:var(--negro2); border:1px solid #2c2c32; border-radius:10px; padding:12px 8px; text-align:center; }
.desglose .item .v{ font-size:19px; font-weight:800; color: var(--dorado);}
.desglose .item .k{ font-size:10.5px; color:var(--texto-tenue); margin-top:4px; line-height:1.3;}

.mensaje-venta{
  background: linear-gradient(135deg, rgba(245,196,40,0.08), rgba(196,79,176,0.06));
  border:1px solid #3a3520; border-radius:12px; padding:18px; text-align:center; margin-bottom:22px; font-size:14px; line-height:1.6;
}

.acciones-final{ display:flex; gap:10px; flex-wrap:wrap; }
.acciones-final .btn{ flex:1; margin-top:0; min-width:140px;}

.pie{ text-align:center; margin-top: 26px; font-size: 11px; color: #8a8894; position:relative; z-index:2; }

.spinner-cargando{ display:flex; align-items:center; gap:8px; justify-content:center; font-size:13px; color: var(--texto-tenue); margin-top:14px; }

.oculto{ display:none !important; }

@media (max-width:480px){
  .contenedor{ padding:18px 12px 40px; }
  .pantalla{ padding:20px; }
  .desglose{ grid-template-columns: repeat(3,1fr); }
  .pregunta-texto{ font-size:16.5px; }
  header.top img{ width:120px; }
}
</style>

<script id="datos-preguntas" type="application/json">[{"id": "R1-01", "ronda": 1, "pregunta": "¿Por qué el refrigerante R600a (isobutano) permite que un refrigerador sea más eficiente energéticamente que uno que usa R134a?", "opciones": ["Porque es un gas más pesado y enfría más rápido", "Porque necesita menos cantidad de carga y tiene mayor calor latente de evaporación, generando mejor rendimiento con menos energía consumida", "Porque no necesita compresor para funcionar", "Porque opera a temperaturas más altas dentro del sistema"], "correcta": 1, "retro": "El R600a requiere una carga menor (aprox. 60-80g vs 150-200g del R134a) y posee mayor calor latente de evaporación, lo que significa que absorbe más calor por cada gramo que se evapora. El compresor trabaja menos ciclos para mantener la temperatura, ahorrando energía de forma directa."}, {"id": "R1-02", "ronda": 1, "pregunta": "¿Cuántas horas mínimas debe reposar un refrigerador ANTES de conectarlo después de haber sido transportado horizontalmente o en ángulo?", "opciones": ["2 a 4 horas", "4 a 6 horas", "8 a 12 horas", "24 horas"], "correcta": 2, "retro": "El aceite del compresor puede migrar hacia la tubería durante el transporte. Si se conecta antes, el aceite puede bloquear el sistema sellado de refrigeración y dañar el compresor permanentemente."}, {"id": "R1-03", "ronda": 1, "pregunta": "¿Cuántos centímetros mínimos de espacio libre debe haber en la parte SUPERIOR de un refrigerador para garantizar una ventilación adecuada?", "opciones": ["5 cm", "10 cm", "15 cm", "20 cm"], "correcta": 2, "retro": "Se requieren al menos 15 cm en la parte superior y 10 cm en los costados y parte trasera para permitir la disipación del calor del condensador y asegurar el funcionamiento eficiente del equipo."}, {"id": "R1-04", "ronda": 1, "pregunta": "¿Por qué NO se debe colocar un refrigerador cerca de una fuente de calor o bajo luz solar directa?", "opciones": ["Porque se decolora el acabado exterior", "Porque el compresor trabaja más, consume más energía y se desgasta más rápido", "Porque la pantalla de control se daña con el calor", "Porque los plásticos internos se derriten"], "correcta": 1, "retro": "El refrigerador necesita expulsar calor al ambiente. Si el ambiente ya está caliente, el sistema trabaja en condiciones de mayor estrés, incrementando el consumo eléctrico hasta un 30% y reduciendo la vida útil del compresor."}, {"id": "R1-05", "ronda": 1, "pregunta": "¿Cuál de las siguientes distribuciones de refrigerador tiene el congelador en la PARTE SUPERIOR?", "opciones": ["Bottom Mount", "Side by Side", "Top Mount", "French Door"], "correcta": 2, "retro": "El Top Mount es el diseño clásico con el freezer arriba y el refrigerador abajo. Es el tipo más popular en la región CAM North por su eficiencia de precio y practicidad."}, {"id": "R1-06", "ronda": 1, "pregunta": "Según la guía de capacidad recomendada, ¿qué refrigerador es ideal para un hogar de 3 a 4 personas?", "opciones": ["1 a 11 pies cúbicos", "14 a 17 pies cúbicos", "18 a 26 pies cúbicos", "Más de 26 pies cúbicos"], "correcta": 1, "retro": "La tabla de capacidad indica: 1-11 pies³ para 1-2 personas, 14-17 pies³ para 3-4 personas, y 18+ pies³ para familias de 5 o más miembros. Esta es la primera pregunta que debe hacerle al cliente en el piso de ventas."}, {"id": "R1-07", "ronda": 1, "pregunta": "¿Qué significa el término 'No Frost' en un refrigerador?", "opciones": ["Que no produce hielo bajo ninguna circunstancia", "Que el sistema elimina automáticamente el hielo acumulado, evitando que el usuario tenga que descongelar manualmente", "Que la temperatura interna nunca baja de 0°C", "Que el refrigerador no usa refrigerante líquido"], "correcta": 1, "retro": "El sistema No Frost usa un ventilador y un calefactor para descongelar el evaporador automáticamente en ciclos programados, eliminando la escarcha y manteniendo el flujo de aire óptimo."}, {"id": "R1-08", "ronda": 1, "pregunta": "¿Cuáles son los cuatro factores principales que los consumidores consideran al comprar un refrigerador, según los insights de Whirlpool?", "opciones": ["Precio, color, tamaño y marca", "Diseño, capacidad, ahorro de energía y preservación de alimentos", "Tecnología, garantía, precio y servicio técnico", "Color, garantía, consumo de agua y ruido"], "correcta": 1, "retro": "Los cuatro pilares de decisión de compra son: Diseño, Capacidad, Ahorro de energía y Preservación de alimentos. El vendedor debe descubrir cuál es la prioridad del cliente para personalizar su argumento."}, {"id": "R1-09", "ronda": 1, "pregunta": "¿Cuál es la diferencia principal entre un compresor convencional ON/OFF y un compresor Inverter?", "opciones": ["El Inverter es más ruidoso pero más potente", "El ON/OFF arranca y para bruscamente; el Inverter ajusta su velocidad continuamente para mantener la temperatura con menor consumo", "El Inverter no tiene compresor; usa celdas Peltier", "El ON/OFF usa R600a; el Inverter usa R134a"], "correcta": 1, "retro": "Un compresor ON/OFF opera a velocidad fija y se cicla encendiéndose y apagándose, generando picos de consumo y variaciones de temperatura. El Inverter regula su velocidad de forma continua, manteniendo la temperatura con hasta 30% menos consumo eléctrico."}, {"id": "R1-10", "ronda": 1, "pregunta": "¿Cuál es la temperatura recomendada para el compartimiento de refrigeración (no el freezer) para una conservación óptima de los alimentos?", "opciones": ["Entre -5°C y 0°C", "Entre 2°C y 6°C", "Entre 7°C y 12°C", "Entre 12°C y 15°C"], "correcta": 1, "retro": "La zona de seguridad alimentaria para el compartimiento de refrigeración es de 2°C a 6°C (temperatura ideal: 4°C). A esta temperatura se inhibe el crecimiento bacteriano sin congelar los alimentos. El freezer debe mantenerse a -18°C o menos."}, {"id": "R1-11", "ronda": 1, "pregunta": "¿Qué es el 'Cold Room' en los refrigeradores Whirlpool WRW25 y WRW32, y a qué temperatura opera aproximadamente?", "opciones": ["Una función que enfría el refrigerador completo a temperatura de congelación", "Un compartimiento especial que opera cerca de los 0°C, ideal para carnes frías, quesos y alimentos en proceso de descongelación, sin llegar a congelarlos", "El nombre del sistema de ventilación Xpert Flow", "La aplicación digital para monitorear la temperatura desde el celular"], "correcta": 1, "retro": "El Cold Room es un cajón interno que opera cerca de 0°C, más baja que el resto del refrigerador (2 a 6°C). Es ideal para carnes frías, embutidos, quesos frescos y alimentos que requieren máxima frescura sin riesgo de congelarse. Es uno de los argumentos diferenciadores más claros en el piso de ventas."}, {"id": "R1-12", "ronda": 1, "pregunta": "¿Cuántas tecnologías integradas componen el sistema XPERT ENERGY SAVER de Whirlpool?", "opciones": ["Una (solo el compresor eficiente)", "Dos (compresor + aislamiento)", "Tres (compresor de alta eficiencia + aislamiento superior HFO + distribución estratégica del aire)", "Cuatro (compresor + aislamiento + aire + inverter)"], "correcta": 2, "retro": "El XPERT ENERGY SAVER integra tres tecnologías: 1) Compresor de Alta Eficiencia, 2) Aislamiento Superior (espuma HFO de alto rendimiento), y 3) Distribución Estratégica del Aire. Las tres trabajan en conjunto para maximizar el ahorro energético."}, {"id": "R1-13", "ronda": 1, "pregunta": "¿Cuántos años de garantía ofrece Whirlpool en el compresor de sus refrigeradores con tecnología Xpert Inverter y Xpert Energy Saver?", "opciones": ["2 años", "5 años", "7 años", "10 años"], "correcta": 3, "retro": "La garantía de 10 años en el compresor es uno de los argumentos de cierre más poderosos de Whirlpool. Refleja la confianza en la durabilidad de sus compresores. Ningún competidor principal ofrece este respaldo en la misma categoría de precio en la región CAM North."}, {"id": "R1-14", "ronda": 1, "pregunta": "¿Qué ventaja tiene el sistema 'Xpert Flow 3D' de Whirlpool sobre los sistemas de enfriamiento convencional?", "opciones": ["Usa R600a en lugar de R134a", "Distribuye el aire frío desde múltiples salidas para mantener una temperatura homogénea en todo el interior del refrigerador", "Crea un campo magnético que preserva los alimentos", "Reduce el ruido del compresor a cero decibelios"], "correcta": 1, "retro": "El Xpert Flow 3D dirige el aire frío desde múltiples puntos de salida hacia todas las zonas del refrigerador, eliminando los puntos calientes. Todos los alimentos, sin importar donde estén ubicados, reciben la misma temperatura óptima de conservación."}, {"id": "R1-15", "ronda": 1, "pregunta": "¿Qué es el filtro 'Everydrop' y con qué frecuencia debe reemplazarse?", "opciones": ["Es un filtro de aceite del compresor; se reemplaza cada 5 años", "Es un filtro de agua y hielo certificado NSF que reduce hasta 74 contaminantes y debe reemplazarse cada 6 meses", "Es un filtro de aire para el interior del refrigerador; anual", "Es un accesorio opcional sin ninguna certificación; no requiere cambio regular"], "correcta": 1, "retro": "El filtro Everydrop está certificado NSF/ANSI 42, 53 y 401, reduce hasta 74 contaminantes (farmacéuticos, pesticidas, plomo, asbesto). El 80% de los consumidores olvida cambiarlo cada 6 meses — es una oportunidad de venta adicional y fidelización del cliente."}, {"id": "R1-16", "ronda": 1, "pregunta": "¿Cuál es la temperatura recomendada del congelador (freezer) para una conservación óptima?", "opciones": ["0°C", "−5°C", "−18°C o menos", "−10°C"], "correcta": 2, "retro": "El freezer debe mantenerse a -18°C o menos para garantizar la seguridad alimentaria y la correcta congelación de los alimentos. A temperaturas superiores, los alimentos pueden deteriorarse más rápidamente."}, {"id": "R2-01", "ronda": 2, "pregunta": "¿A qué familia y capacidad pertenece el SKU WRW32DKTWW, número uno en volumen de inventario de la región CAM North?", "opciones": ["French Door de 22 pies cúbicos", "Top Mount de 11 pies cúbicos (305 litros), familia Delta", "Side by Side de 18 pies cúbicos", "Top Mount de 9 pies cúbicos (264 litros)"], "correcta": 1, "retro": "El WRW32DKTWW es el SKU estrella del portafolio CAM North con más de 6,800 unidades en inventario. Es un Top Mount de 305 litros / 11 pies cúbicos de la línea Delta, equipado con Xpert Flow 3D, Cold Room, dispensador de agua de 2L y garantía de 10 años en el compresor."}, {"id": "R2-02", "ronda": 2, "pregunta": "¿Cuál es la capacidad en litros del modelo WRW25DKTWW, segundo SKU en volumen de inventario CAM North?", "opciones": ["305 litros / 11 pies cúbicos", "264 litros / 9 pies cúbicos", "440 litros / 15 pies cúbicos", "380 litros / 13 pies cúbicos"], "correcta": 1, "retro": "El WRW25DKTWW tiene una capacidad de 264 litros (9 pies cúbicos), siendo el modelo de entrada de la familia Delta. Con más de 6,000 unidades en inventario, es ideal para familias pequeñas o parejas y es el 'entry point' de la línea premium Whirlpool en la región."}, {"id": "R2-03", "ronda": 2, "pregunta": "La familia 'Black Swan' de Whirlpool ofrece tres colores exclusivos. ¿Cuáles son y cuáles son sus códigos en la nomenclatura de SKU?", "opciones": ["Blanco (WW), Gris (GG), Negro (NN)", "Cobalto (MG), Onyx (MB) y Zafiro (WB)", "Silver (SS), Gold (GG), Black (BB)", "Titanio (TT), Marfil (IV), Grafito (GR)"], "correcta": 1, "retro": "Los tres colores Black Swan son: MG = Cobalto (tono gris azulado), MB = Onyx (negro mate) y WB = Zafiro (negro brillante). Los accesorios externos siempre son de color negro en toda la línea Black Swan, dando un look premium y consistente."}, {"id": "R2-04", "ronda": 2, "pregunta": "¿Qué características diferenciales tiene el modelo WRW45AKTWB respecto a los modelos WRW25 y WRW32 de la misma familia?", "opciones": ["Tiene más capacidad (440 litros/15 pies), panel de control en puerta, Flexi Space y cajón doble para frutas y verduras", "Es más pequeño y por eso más barato", "No tiene dispensador de agua", "No usa tecnología Inverter"], "correcta": 0, "retro": "El WRW45AKTWB es el modelo de 15 pies cúbicos de la línea Black Swan. Sus características exclusivas vs WRW25/32 son: Panel de control en la puerta exterior, Flexi Space (cajón que preserva frutas congeladas), cajón doble para frutas y verduras, y mayor capacidad de 440 litros."}, {"id": "R2-05", "ronda": 2, "pregunta": "¿Cuál es la diferencia entre los modelos WRW32DKTWW (familia Delta) y el WRW32CKTWW (familia anterior)?", "opciones": ["Solo cambia el color; las características técnicas son idénticas", "La 'D' indica la familia Delta: mayor eficiencia energética con un diseño 99% similar al Black Swan, acabado EVOX (1 capa de acero + 5 capas de polímero) y Cold Room con 5L más de espacio", "La 'D' tiene más pies cúbicos que la 'C'", "La 'C' tiene garantía de 10 años; la 'D' solo 5 años"], "correcta": 1, "retro": "La familia Delta (letra 'D' en el SKU) representa la evolución de la familia 'C'. El acabado EVOX es una estructura de 1 capa de acero + 5 capas de polímero, resistente a huellas y corrosión. El Cold Room cuenta con 5L adicionales vs el modelo anterior."}, {"id": "R2-06", "ronda": 2, "pregunta": "¿Cuál es la familia de los modelos WRJ43AKTWW, WRJ43BKTWW, WRW45BKTWW?", "opciones": ["Delta", "Black Swan", "Antioquia", "NOVA"], "correcta": 2, "retro": "Estos modelos pertenecen a la familia Antioquia: son los SKUs WRJ43 y WRW45 con terminación WW y acabado tipo EVOX. Delta son los WRW25 y WRW32DT con terminación WW. Black Swan son los modelos en tonos oscuros: Cobalto (MG), Onyx (MB) y Zafiro (WB)."}, {"id": "R2-07", "ronda": 2, "pregunta": "El modelo WT32409D (familia NOVA) incluye dispensador de agua de 2.5L. ¿Cuál es la diferencia principal respecto al WT02409D?", "opciones": ["Diferente capacidad: uno tiene 9 pies y el otro 11 pies", "El WT32409D incluye dispensador de agua de 2.5L; el WT02409D no tiene dispensador externo de agua", "El WT02409D tiene tecnología Inverter y el WT32409D no", "Solo difieren en el color disponible"], "correcta": 1, "retro": "Ambos modelos NOVA comparten la misma capacidad (9 pies cúbicos), tecnología Xpert Inverter y características interiores. La diferencia clave es que el WT32409D incluye dispensador externo de agua de 2.5L mientras el WT02409D es el modelo base sin dispensador, a menor precio."}, {"id": "R2-08", "ronda": 2, "pregunta": "¿Cuál es la capacidad y por qué son estratégicamente importantes los modelos WRJ43AKTWW y WRJ43BKTWW?", "opciones": ["11 pies cúbicos Top Mount; compiten en el segmento básico de entrada", "14 pies cúbicos Top Mount; están en el segmento donde compite directamente con el refrigerador más vendido de la región", "25 pies cúbicos French Door; son los más grandes del portafolio", "9 pies cúbicos Bottom Mount; compiten en el segmento económico"], "correcta": 1, "retro": "Los modelos WRJ43 son Top Mount de 14 pies cúbicos. Su importancia estratégica es que operan en el mismo rango de capacidad que el refrigerador más vendido de la región CAM North (cerca de 20,000 unidades). Conocer a fondo el WRJ43 y sus ventajas es clave para ganar ventas en este segmento competido."}, {"id": "R2-09", "ronda": 2, "pregunta": "¿Qué es el acabado EVOX que tienen los modelos de la familia Delta y Antioquia y cuál es su beneficio principal?", "opciones": ["Es el nombre del sistema de sonido interno del refrigerador", "Es un acabado compuesto por 1 capa de acero y 5 capas de polímero, Anti-fingerprint, diseñado para proteger de la corrosión y el óxido superficial, además de resistir las huellas digitales", "Es un recubrimiento antibacterial", "Es el nombre del refrigerante usado en ese modelo"], "correcta": 1, "retro": "EVOX es un acabado multicapa: 1 capa de acero base + 5 capas de polímero. Lo hace resistente a las huellas digitales (Anti-fingerprint), facilita la limpieza y protege la superficie del óxido, manteniendo el aspecto premium del refrigerador por más tiempo."}, {"id": "R2-10", "ronda": 2, "pregunta": "¿A qué familia pertenecen los modelos WD1610S y WD1600S de Whirlpool y cuál es su tipo de instalación?", "opciones": ["Familia Black Swan; instalación Standard Depth", "Familia Clapton; Side by Side de profundidad a gabinete (Counter Depth), ideal para cocinas de diseño moderno", "Familia NOVA; Top Mount con dispensador externo", "Familia Delta; French Door de alta capacidad"], "correcta": 1, "retro": "El WD1610S y el WD1600S pertenecen a la familia Clapton, el portafolio Side by Side Counter Depth de Whirlpool. Incluyen: tecnología Xpert Inverter, controles Capacitive Touch, grill no visible, bisagras ocultas, puertas curvadas y manija con acentos de cromo."}, {"id": "R2-11", "ronda": 2, "pregunta": "¿Cuántos litros de capacidad tiene el dispensador de agua de los modelos WRW25DKTWW y WRW32DKTWW (familia Delta)?", "opciones": ["1 litro", "1.5 litros", "2 litros", "2.5 litros"], "correcta": 2, "retro": "Los modelos WRW25/32 de la línea Delta tienen un dispensador de agua de 2 litros de capacidad (tanque fijo). Esta característica es clave para el consumidor que busca agua fría sin necesidad de conexión a tubería directa. El modelo NOVA WT32409D supera esto con 2.5L."}, {"id": "R2-12", "ronda": 2, "pregunta": "¿Cuántos pies cúbicos tienen respectivamente los nuevos modelos French Door WRFF3136SZ y WRFF3536SZ?", "opciones": ["21 y 25 pies cúbicos", "27 y 28 pies cúbicos", "31 y 30 pies cúbicos", "35 pies cúbicos ambos"], "correcta": 2, "retro": "El WRFF3136SZ tiene 31 pies cúbicos y el WRFF3536SZ tiene 30 pies cúbicos, siendo de los French Door de mayor capacidad de su clase. Ambos incluyen: Ice Maker interior, control de temperatura en puerta, anaqueles ajustables para galón, pizza pocket y Energy Star."}, {"id": "R2-13", "ronda": 2, "pregunta": "¿Cuál es la diferencia entre el WRFF3136SZ y el WRFF3536SZ de la nueva línea French Door?", "opciones": ["El 3536SZ tiene mayor capacidad total", "El 3536SZ incluye dispensador externo de agua y hielo en la puerta; el 3136SZ solo tiene Ice Maker interno en el congelador", "El 3136SZ es más grande y más caro", "Solo cambia el color; son técnicamente idénticos"], "correcta": 1, "retro": "El WRFF3136SZ (31 cu ft) es el modelo con Ice Maker interno en el congelador (sin dispensador en la puerta exterior). El WRFF3536SZ (30 cu ft) agrega el dispensador externo de agua y hielo en la puerta, siendo el modelo más completo para el cliente que quiere acceso inmediato sin abrir la puerta."}, {"id": "R2-14", "ronda": 2, "pregunta": "¿Qué son los modelos Sidekick (WSR57R18DM / WSZ57L18DM) y cuál es su capacidad individual y combinada?", "opciones": ["Son un refrigerador y un congelador tipo columna independiente de 18 pies cúbicos cada uno; juntos suman 36 pies cúbicos con diseño Built-In y tecnología Xpert Inverter", "Son dos modelos Side by Side de 9 pies que se conectan entre sí", "Son el refrigerador y el congelador del modelo French Door desmontables", "Son accesorios de organización interna para el WRW45"], "correcta": 0, "retro": "Los Sidekicks son columnas independientes premium: WSR57R18DM = columna refrigerador (18 pies cúbicos) y WSZ57L18DM = columna congelador (18 pies cúbicos). Juntos suman 36 pies cúbicos totales. Incluyen parrillas ajustables, pizza pocket, torre de aire, alarma de temperatura, Fast Freeze y opción de fábrica de hielo."}, {"id": "R2-15", "ronda": 2, "pregunta": "¿Cuántos días de preservación de aguacates, calabacines y manzanas ha probado y certificado Whirlpool con la tecnología Xpert Inverter?", "opciones": ["5 días", "10 días", "15 días", "30 días"], "correcta": 2, "retro": "Whirlpool ha realizado pruebas certificadas demostrando hasta 15 días de preservación con aguacates, calabacines y manzanas. Este dato es muy poderoso en el mercado centroamericano, donde las frutas y verduras frescas representan una inversión económica semanal significativa para las familias."}, {"id": "R2-16", "ronda": 2, "pregunta": "¿Qué modelo Whirlpool tiene el menor tiempo de rotación (D.INV), indicando que es el más rápido en venderse y nunca debe faltar en exhibición?", "opciones": ["WRW45AKTWW", "WRW32CKTWW", "WT02409D con 44 días de inventario", "WRJ43BKTWW"], "correcta": 2, "retro": "El WT02409D tiene solo 44 días de inventario (D.INV), el más bajo entre los modelos Whirlpool del portafolio. Alta rotación, posiblemente por su precio accesible al ser el modelo NOVA sin dispensador. Tenerlo bien exhibido y disponible es crítico para no perder ventas."}, {"id": "R3-01", "ronda": 3, "pregunta": "¿Cuál es el argumento de liderazgo de producto más poderoso que tiene Whirlpool en el mercado de refrigeración CAM North?", "opciones": ["Que Whirlpool tiene la mayor participación de mercado de la región", "Que Whirlpool tiene DOS modelos en el Top 5 de los refrigeradores más vendidos de la región, demostrando que los consumidores ya confían y validan la marca con su propia decisión de compra", "Que Whirlpool tiene el precio más bajo de la categoría", "Que Whirlpool es la única marca con tecnología Inverter en la región"], "correcta": 1, "retro": "Tener DOS modelos en el Top 5 de ventas es un argumento de credibilidad excepcional: no lo dice Whirlpool, lo dicen los consumidores con su compra. El WRW25CKTWW y el WRW32CKTWW están en el puesto 3 y 4 del ranking GFK Guatemala. Ese dato convierte al vendedor en asesor de confianza."}, {"id": "R3-02", "ronda": 3, "pregunta": "Un cliente dice que el refrigerador más vendido de la región es de la competencia. ¿Cuál es el mejor argumento de respuesta?", "opciones": ["Decirle que ese modelo se daña rápido y el servicio técnico es caro", "Whirlpool tiene 2 de los 5 refrigeradores más vendidos en la región, menor consumo energético, garantía de 10 años en compresor y tecnología Xpert Flow que preserva mejor los alimentos para el clima de Centroamérica", "Decirle que no le haga caso a los rankings", "Decirle que el de la competencia es de mala calidad"], "correcta": 1, "retro": "Nunca denigrar a la competencia. Enfocar el argumento en: a) Liderazgo comprobado de Whirlpool en rankings reales (2 de los top 5), b) Diferencias técnicas medibles (consumo energético, preservación), c) Garantía de 10 años en el compresor, d) Tecnología Xpert Flow diseñada para climas tropicales."}, {"id": "R3-03", "ronda": 3, "pregunta": "¿Cuál es la estrategia correcta cuando el cliente solo habla de precio y quiere el modelo más barato posible?", "opciones": ["Bajar el precio sin cuestionar", "Hacer preguntas para entender la necesidad real: ¿cuántas personas en la familia?, ¿cuánto gasta en alimentos por semana?, ¿cuánto paga de electricidad?, y mostrar los beneficios que alimenten el valor de marca", "Mostrar solo los modelos más económicos sin dar opciones de upsell", "Decirle que si quiere barato, que compre otra marca"], "correcta": 1, "retro": "La estrategia de valor no compite en precio, compite en beneficio. Al preguntar sobre el hogar, descubres la necesidad real. Si una familia de 4 personas necesita 14 pies cúbicos, el costo de comprar uno de 9 pies supera con creces la diferencia de precio."}, {"id": "R3-04", "ronda": 3, "pregunta": "Un cliente pregunta: '¿Por qué debería confiar en Whirlpool si hay marcas que llevan más tiempo en el mercado centroamericano?' ¿Cuál es la mejor respuesta?", "opciones": ["Las marcas antiguas ya no innovan; solo Whirlpool lo hace", "Whirlpool no es nuevo: es una empresa con más de 100 años de historia global, con tecnología Xpert Inverter probada en más de 50 países y una garantía de 10 años en el compresor que respalda con hechos su confianza en sus propios productos", "Las otras marcas son de peor calidad aunque parezcan confiables", "No importa la trayectoria; lo que importa es el precio"], "correcta": 1, "retro": "Whirlpool es una de las empresas de electrodomésticos más grandes del mundo, con presencia en más de 170 países. El argumento más poderoso es combinar trayectoria con hechos concretos: tecnología comprobada + garantía de 10 años en el compresor. Ninguna promesa de confianza es más fuerte que una garantía larga."}, {"id": "R3-05", "ronda": 3, "pregunta": "¿Cuál es el argumento energético para ganarle a la competencia en el segmento Top Mount 11 pies cúbicos?", "opciones": ["Que Whirlpool consume significativamente menos en ese segmento", "Que el WRW32DKTWW ofrece 303L de capacidad con diferencia de consumo mínima vs la competencia, pero agrega Cold Room, Xpert Flow 3D y garantía de 10 años", "Que la competencia no tiene garantía en sus compresores", "Que Whirlpool tiene más colores disponibles"], "correcta": 1, "retro": "Según etiquetas de eficiencia RTCA, la diferencia de consumo entre Whirlpool y la competencia en este segmento es mínima. La victoria de Whirlpool está en los diferenciales de producto: Cold Room para carnes, Xpert Flow 3D para temperatura homogénea y 10 años de garantía en el compresor."}, {"id": "R3-06", "ronda": 3, "pregunta": "¿Cuál es la mejor técnica de 'upsell' cuando el cliente llegó a ver un refrigerador de 9 pies?", "opciones": ["Decirle directamente que el de 9 pies no sirve para nada", "Mostrarle primero el de 9 pies, luego hacer preguntas sobre su familia y hábitos, y si tiene familia de 3-4 personas mostrarle el beneficio del de 11 pies con el argumento de costo por pie cúbico por año", "Mostrar solo el modelo más caro disponible sin preguntar nada", "Decirle que el de 9 pies está agotado y solo queda el de 11 pies"], "correcta": 1, "retro": "El upsell consultivo funciona en 3 pasos: 1) Mostrar el producto solicitado (no rechazarlo), 2) Preguntar por necesidad ('¿cuántos son en casa?', '¿compran semanal o quincenal?'), 3) Si el perfil lo justifica, mostrar el modelo superior con argumento de valor. El cliente compra valor, no precio."}, {"id": "R3-07", "ronda": 3, "pregunta": "¿Qué debe hacer el vendedor cuando un cliente menciona que vio el mismo refrigerador más barato en otra tienda?", "opciones": ["Igualar el precio inmediatamente sin cuestionar", "Decirle que en la otra tienda el producto es de segunda calidad", "Validar la información y enfocarse en el valor agregado: garantía, instalación, servicio posventa, financiamiento y los atributos únicos del producto", "Ignorar el comentario y cambiar de tema"], "correcta": 2, "retro": "La respuesta al precio siempre es valor. Primero validar ('entiendo que el precio importa'), luego agregar valor ('pero aquí usted recibe X, Y, Z adicionales'). El valor diferencial está en el servicio, la confianza y la experiencia de compra. Nunca competir solo con precio."}, {"id": "R3-08", "ronda": 3, "pregunta": "¿Cuál es el argumento de cierre de venta MÁS EFECTIVO según la filosofía de ventas Whirlpool?", "opciones": ["'Le doy un descuento del 20% si lo lleva hoy mismo'", "'Este es el último que me queda, mañana no sé si habrá'", "'Con los ahorros en electricidad más la garantía de 10 años en el compresor, este refrigerador se paga solo. ¿Lo entregamos esta semana o prefiere programar para la próxima?'", "'Todos los vecinos del condominio ya tienen este modelo'"], "correcta": 2, "retro": "El cierre más efectivo combina: 1) Argumento racional de retorno de inversión (ahorro energético), 2) Argumento emocional de tranquilidad (garantía larga), y 3) Cierre alternativo (no '¿lo compra?' sino '¿cuándo se lo entregamos?'). Este cierre avanza hacia la acción sin presión y con base en valor real."}, {"id": "R3-09", "ronda": 3, "pregunta": "¿Qué debería preguntar un vendedor PRIMERO cuando un cliente entra al piso de ventas preguntando por un refrigerador?", "opciones": ["'¿Cuánto tiene pensado gastar?'", "'¿De qué color lo quiere?'", "'¿Para cuántas personas es el refrigerador?' o '¿Qué tipo de familia tiene?'", "'¿Ya vio los precios de la competencia?'"], "correcta": 2, "retro": "La pregunta sobre el número de personas define el tamaño necesario, que es el factor más importante de la decisión. Preguntar por precio primero pone al vendedor en desventaja y enmarca la conversación en costo en lugar de valor. La primera pregunta debe establecer la necesidad."}, {"id": "R3-10", "ronda": 3, "pregunta": "¿Cuál es el 'pitch de 60 segundos' completo que un vendedor Whirlpool debe dominar cuando el cliente pregunta '¿Por qué Whirlpool?'?", "opciones": ["'Porque es la marca más antigua y tiene muchos modelos'", "'Porque Whirlpool tiene la mejor publicidad en televisión'", "'Whirlpool tiene 2 de los 5 refrigeradores más vendidos en la región. Nuestra tecnología Xpert Inverter/Energy Saver le ahorra en electricidad mes a mes. Nuestro sistema Xpert Flow preserva sus alimentos hasta 15 días más. La garantía de 10 años en el compresor le da tranquilidad. Y en colores como el Black Swan (Cobalto, Onyx, Zafiro), su refrigerador también es parte del diseño de su cocina. Eso es Whirlpool: tecnología que se disfruta.'", "'Porque aquí está en oferta y después sube de precio'"], "correcta": 2, "retro": "El pitch perfecto combina 5 elementos: 1) CREDIBILIDAD: '2 de los 5 más vendidos' (datos reales), 2) AHORRO: 'Xpert Inverter ahorra en electricidad' (racional), 3) VALOR PRÁCTICO: 'preserva 15 días más' (beneficio tangible), 4) CONFIANZA: '10 años de garantía en el compresor', 5) IDENTIDAD: 'Black Swan / diseño para su cocina' (emocional)."}, {"id": "R3-11", "ronda": 3, "pregunta": "¿Cómo se puede convertir la venta de un filtro Everydrop en una estrategia de fidelización de clientes?", "opciones": ["Vendiéndolos uno a uno cuando el cliente regrese con problemas", "Ofreciendo un plan de reposición cada 6 meses, recordando al cliente que el 80% olvida cambiar el filtro, y mostrando los 74 contaminantes que se eliminan como argumento de salud familiar", "Regalando filtros con cada compra de refrigerador sin mencionar que necesitan reemplazo", "No es posible fidelizar con accesorios; solo con descuentos en nuevos refrigeradores"], "correcta": 1, "retro": "Los filtros Everydrop son una palanca de fidelización: el cliente vuelve cada 6 meses (punto de contacto recurrente), el argumento de salud (74 contaminantes) crea urgencia real, y cada visita por filtro es una oportunidad de mostrar nuevos modelos."}, {"id": "R3-12", "ronda": 3, "pregunta": "¿Cuál es el argumento para vender la línea Black Swan a un cliente que considera un refrigerador de acero inoxidable convencional?", "opciones": ["'El Black Swan es más barato que el acero inoxidable'", "'El Black Swan es la misma tecnología con colores exclusivos (Cobalto, Onyx, Zafiro) que transforman el refrigerador en un elemento de diseño de cocina, diferenciándose de todos y reflejando personalidad propia. Mismo precio o similar, mayor impacto visual'", "'El Black Swan es solo una tendencia; el inox siempre será más popular'", "'No hay diferencia técnica entre ambas líneas; es solo el color'"], "correcta": 1, "retro": "Los consumidores que buscan diseño moderno son exactamente el target de Black Swan. La tendencia del mercado muestra que el consumidor centroamericano migra hacia productos de mayor valor percibido y personalización. Black Swan captura ese deseo con tres colores exclusivos que el inox convencional no puede ofrecer."}, {"id": "R3-13", "ronda": 3, "pregunta": "¿Cuál es la estrategia correcta para vender los modelos Sidekick a un cliente que considera un Side by Side convencional?", "opciones": ["Decirle que el Sidekick es lo mismo pero más caro", "Mostrar que los dos Sidekicks juntos suman 36 pies cúbicos totales (18 pies cada uno), ofrecen diseño Built-In, instalación flexible como columna independiente o en pareja, y son el sistema premium para cocinas de alto diseño", "No intentar vender el Sidekick porque muy poca gente lo entiende", "Decirle que primero espere a ver si hay una oferta más adelante"], "correcta": 1, "retro": "Los Sidekicks son 18 pies cúbicos cada uno, sumando 36 pies cúbicos en pareja: más que cualquier SxS convencional. Su argumento es exclusividad, diseño y flexibilidad. El cliente objetivo busca diseño de cocina premium y personalización total."}, {"id": "R3-14", "ronda": 3, "pregunta": "¿Cuál es la estrategia correcta cuando el cliente quiere comprar el modelo más económico pero tiene una familia de 5 personas?", "opciones": ["Venderle el más económico para no perder la venta", "Decirle que no se lo puede vender porque no le va a alcanzar el espacio", "Explicar con datos que un 9 pies para 5 personas significa abrir y cerrar la puerta constantemente (más consumo), falta de espacio y posible deterioro de alimentos, vs la diferencia de precio del upsell", "Ofrecerle dos refrigeradores de 9 pies en lugar de uno de mayor capacidad"], "correcta": 2, "retro": "Un 9 pies para 5 personas genera: sobrecargar el espacio (bloqueo del flujo de aire = más consumo), abrir/cerrar más veces (pérdida de temperatura = más consumo) y no poder almacenar compras completas (más viajes al mercado = más gasto). El argumento del costo real convierte el 'no tengo dinero' en 'vale la pena invertir más'."}]</script>

<script>
// ============================================================
// AUDIO RETRO ARCADE — música animada + efectos (Web Audio API)
// ============================================================

let AUDIO_CTX = null;
let AUDIO_ACTIVO = true;
let MUSICA_NODOS = null;

function getAudioCtx(){
  if(!AUDIO_CTX){
    AUDIO_CTX = new (window.AudioContext || window.webkitAudioContext)();
  }
  return AUDIO_CTX;
}

function reanudarAudioSiNecesario(){
  const ctx = getAudioCtx();
  if(ctx.state === 'suspended'){
    ctx.resume();
  }
}

function sfxAcierto(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.07;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.09, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.18);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.2);
  });
}

function sfxError(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(180, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.35);
  gain.gain.setValueAtTime(0.09, ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  osc.connect(gain); gain.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.36);
}

function sfxVictoria(){
  if(!AUDIO_ACTIVO) return;
  const ctx = getAudioCtx();
  const notas = [392, 523.25, 659.25, 783.99, 1046.5];
  notas.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctx.currentTime + i*0.1;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.12, t0+0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+0.3);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(t0); osc.stop(t0+0.32);
  });
}

// ---- Música de fondo animada: melodía + bajo + percusión simple, en loop ----
// Patrón inspirado en arcade retro: bajo marcando el pulso, melodía sincopada arriba, hi-hat ligero.

const MUSICA_BAJO    = [196, 196, 246.94, 196, 220, 220, 261.63, 220];
const MUSICA_MELODIA = [392, 0, 523.25, 466.16, 392, 0, 440, 392, 523.25, 0, 587.33, 523.25, 440, 0, 392, 0];
const MUSICA_TEMPO_PASO = 0.16; // segundos por paso de melodia (rapido, animado)

function iniciarMusicaFondo(){
  if(!AUDIO_ACTIVO) return;
  detenerMusicaFondo();
  const ctx = getAudioCtx();
  const master = ctx.createGain();
  master.gain.value = 0.065;
  master.connect(ctx.destination);

  let pasoMelodia = 0;
  let pasoBajo = 0;

  function programarPasoMelodia(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_MELODIA[pasoMelodia % MUSICA_MELODIA.length];
    if(freq > 0){
      const osc = ctxNow.createOscillator();
      const gain = ctxNow.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      const t0 = ctxNow.currentTime;
      gain.gain.setValueAtTime(0.001, t0);
      gain.gain.linearRampToValueAtTime(0.07, t0+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*0.85);
      osc.connect(gain); gain.connect(master);
      osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO);
    }
    // hi-hat ligero en pasos pares
    if(pasoMelodia % 2 === 0){
      const bufferSize = ctxNow.sampleRate * 0.02;
      const buffer = ctxNow.createBuffer(1, bufferSize, ctxNow.sampleRate);
      const data = buffer.getChannelData(0);
      for(let i=0;i<bufferSize;i++){ data[i] = (Math.random()*2-1)*0.3; }
      const noise = ctxNow.createBufferSource();
      noise.buffer = buffer;
      const hatGain = ctxNow.createGain();
      hatGain.gain.value = 0.025;
      noise.connect(hatGain); hatGain.connect(master);
      noise.start();
    }
    pasoMelodia++;
  }

  function programarPasoBajo(){
    if(!MUSICA_NODOS) return;
    const ctxNow = getAudioCtx();
    const freq = MUSICA_BAJO[pasoBajo % MUSICA_BAJO.length];
    const osc = ctxNow.createOscillator();
    const gain = ctxNow.createGain();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const t0 = ctxNow.currentTime;
    gain.gain.setValueAtTime(0.001, t0);
    gain.gain.linearRampToValueAtTime(0.08, t0+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t0+MUSICA_TEMPO_PASO*1.7);
    osc.connect(gain); gain.connect(master);
    osc.start(t0); osc.stop(t0+MUSICA_TEMPO_PASO*2);
    pasoBajo++;
  }

  const intervalMelodia = setInterval(programarPasoMelodia, MUSICA_TEMPO_PASO*1000);
  const intervalBajo = setInterval(programarPasoBajo, MUSICA_TEMPO_PASO*2000);
  MUSICA_NODOS = { master, intervalMelodia, intervalBajo };
  programarPasoMelodia();
  programarPasoBajo();
}

function detenerMusicaFondo(){
  if(MUSICA_NODOS){
    clearInterval(MUSICA_NODOS.intervalMelodia);
    clearInterval(MUSICA_NODOS.intervalBajo);
    try{ MUSICA_NODOS.master.disconnect(); }catch(e){}
    MUSICA_NODOS = null;
  }
}

function toggleAudio(){
  AUDIO_ACTIVO = !AUDIO_ACTIVO;
  if(!AUDIO_ACTIVO){
    detenerMusicaFondo();
  } else {
    reanudarAudioSiNecesario();
    iniciarMusicaFondo();
  }
  return AUDIO_ACTIVO;
}

<script>
// ============================================================
// DESAFÍO DE LAVADORAS — Lógica de la aplicación
// ============================================================

const RONDA_INFO = {
  1: { nombre: "Ronda 1 · Instalación y Producto Básico", cantidad: 10, intro: "Lo que todo asesor debe saber de memoria: parrillas, quemadores, encendido, BTU y capacidades de la línea Whirlpool." },
  2: { nombre: "Ronda 2 · Tecnologías y Diferenciadores", cantidad: 10, intro: "Sube de nivel: Air Fry, SCHOTT CERAN, Xpert Flamma y los sistemas que distinguen a Whirlpool en la cocina." },
  3: { nombre: "Ronda 3 · Venta Consultiva y Competencia", cantidad: 10, intro: "El nivel más exigente: manejo de objeciones, comparativos frente a la competencia y cómo recomendar el modelo correcto." }
};

const PUNTOS_POR_ACIERTO = 10;

let ESTADO = {
  nombre: "",
  pais: "",
  intento: 1,
  rondaActual: 1,
  preguntasSesion: { 1: [], 2: [], 3: [] },
  indiceEnRonda: 0,
  score: 0,
  correctas: 0,
  totalPreguntas: 0,
  respondida: false,
  resultadosPorRonda: { 1: 0, 2: 0, 3: 0 }
};

function $(sel){ return document.querySelector(sel); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function el(tag, cls, html){
  const e = document.createElement(tag);
  if(cls) e.className = cls;
  if(html !== undefined) e.innerHTML = html;
  return e;
}

function mezclarArray(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function tomarAlAzar(arr, n){
  return mezclarArray(arr).slice(0, Math.min(n, arr.length));
}

function cargarBancoPreguntas(){
  const raw = document.getElementById('datos-preguntas').textContent;
  return JSON.parse(raw);
}

function prepararSesion(){
  const banco = cargarBancoPreguntas();
  const porRonda = { 1: [], 2: [], 3: [] };
  banco.forEach(p => porRonda[p.ronda].push(p));

  ESTADO.preguntasSesion[1] = tomarAlAzar(porRonda[1], RONDA_INFO[1].cantidad);
  ESTADO.preguntasSesion[2] = tomarAlAzar(porRonda[2], RONDA_INFO[2].cantidad);
  ESTADO.preguntasSesion[3] = tomarAlAzar(porRonda[3], RONDA_INFO[3].cantidad);

  ESTADO.totalPreguntas = RONDA_INFO[1].cantidad + RONDA_INFO[2].cantidad + RONDA_INFO[3].cantidad;
  ESTADO.score = 0;
  ESTADO.correctas = 0;
  ESTADO.rondaActual = 1;
  ESTADO.indiceEnRonda = 0;
  ESTADO.resultadosPorRonda = { 1: 0, 2: 0, 3: 0 };
}

// ---------- localStorage: identidad + historial local ----------
const LS_KEY = "desafio_lavadoras_v1";

function leerLocal(){
  try{
    return JSON.parse(localStorage.getItem(LS_KEY)) || {};
  }catch(e){ return {}; }
}
function guardarLocal(obj){
  const actual = leerLocal();
  const nuevo = Object.assign({}, actual, obj);
  localStorage.setItem(LS_KEY, JSON.stringify(nuevo));
}

function obtenerIntentosPrevios(nombre){
  const data = leerLocal();
  const intentos = (data.intentos && data.intentos[MODULO_ACTUAL] && data.intentos[MODULO_ACTUAL][nombre.toLowerCase()]) || [];
  return intentos;
}

function registrarIntentoLocal(nombre, resultado){
  const data = leerLocal();
  if(!data.intentos) data.intentos = {};
  if(!data.intentos[MODULO_ACTUAL]) data.intentos[MODULO_ACTUAL] = {};
  const key = nombre.toLowerCase();
  if(!data.intentos[MODULO_ACTUAL][key]) data.intentos[MODULO_ACTUAL][key] = [];
  data.intentos[MODULO_ACTUAL][key].push(resultado);
  guardarLocal(data);
}

// ---------- Envío a backend (Google Sheets) ----------
async function enviarResultado(payload){
  if(!BACKEND_URL){
    return { ok:false, local:true };
  }
  try{
    const resp = await fetch(BACKEND_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(payload)
    });
    const data = await resp.json();
    return data;
  }catch(err){
    console.error("Error al enviar resultado:", err);
    return { ok:false, error: err.message };
  }
}

async function obtenerRanking(){
  if(!BACKEND_URL) return null;
  try{
    const resp = await fetch(BACKEND_URL + "?action=ranking");
    const data = await resp.json();
    return data.ok ? data.ranking : null;
  }catch(err){
    return null;
  }
}

function renderPregunta(){
  const ronda = ESTADO.rondaActual;
  const preguntas = ESTADO.preguntasSesion[ronda];
  const idx = ESTADO.indiceEnRonda;
  const pregunta = preguntas[idx];

  const totalEnRonda = preguntas.length;
  const numGlobal = sumaPreguntasRondasPrevias(ronda) + idx + 1;
  const pctGlobal = Math.round((numGlobal-1) / ESTADO.totalPreguntas * 100);

  const cont = $('#pantalla-app');
  cont.innerHTML = `
    <div class="hud">
      <span class="ronda-tag">${RONDA_INFO[ronda].nombre}</span>
      <div class="progreso-wrap">
        <div class="barra-progreso"><div style="width:${pctGlobal}%"></div></div>
      </div>
      <span class="score-box">⚡ ${ESTADO.score} pts</span>
      <button class="btn-audio-cuestionario" id="btn-audio-cuestionario">${AUDIO_ACTIVO ? '🔊' : '🔇'}</button>
    </div>
    <div class="pregunta-num">Pregunta ${idx+1} de ${totalEnRonda} · (${numGlobal}/${ESTADO.totalPreguntas} total)</div>
    <div class="pregunta-texto">${escapeHtml(pregunta.pregunta)}</div>
    <div class="opciones" id="lista-opciones"></div>
    <div id="zona-retro"></div>
    <div class="siguiente-wrap" id="zona-siguiente"></div>
  `;

  const btnAudio = document.getElementById('btn-audio-cuestionario');
  if(btnAudio){
    btnAudio.addEventListener('click', () => {
      const activo = toggleAudio();
      btnAudio.textContent = activo ? '🔊' : '🔇';
    });
  }


  const listaOpciones = document.getElementById('lista-opciones');
  pregunta.opciones.forEach((texto, i) => {
    const btnOp = el('button', 'opcion', escapeHtml(texto));
    btnOp.dataset.idx = i;
    btnOp.addEventListener('click', () => onResponder(i, pregunta));
    listaOpciones.appendChild(btnOp);
  });

  ESTADO.respondida = false;
}

function sumaPreguntasRondasPrevias(rondaActual){
  let suma = 0;
  for(let r=1; r<rondaActual; r++){
    suma += ESTADO.preguntasSesion[r].length;
  }
  return suma;
}

function onResponder(indiceElegido, pregunta){
  if(ESTADO.respondida) return;
  ESTADO.respondida = true;

  const esCorrecta = indiceElegido === pregunta.correcta;
  if(esCorrecta){
    ESTADO.score += PUNTOS_POR_ACIERTO;
    ESTADO.correctas += 1;
    ESTADO.resultadosPorRonda[ESTADO.rondaActual] += 1;
  }

  // Marcar visualmente las opciones
  const botones = document.querySelectorAll('#lista-opciones .opcion');
  botones.forEach(btn => {
    btn.disabled = true;
    const i = Number(btn.dataset.idx);
    if(i === pregunta.correcta){
      btn.classList.add('correcta');
    }
    if(i === indiceElegido && !esCorrecta){
      btn.classList.add('incorrecta');
    }
  });

  // Retroalimentación
  const zonaRetro = document.getElementById('zona-retro');
  zonaRetro.innerHTML = `
    <div class="retro-box ${esCorrecta ? 'ok' : 'no'}">
      <span class="etiqueta">${esCorrecta ? '✓ Correcto' : '✕ No es la respuesta correcta'}</span>
      ${escapeHtml(pregunta.retro)}
    </div>
  `;

  // Botón siguiente
  const zonaSig = document.getElementById('zona-siguiente');
  const esUltimaDeRonda = ESTADO.indiceEnRonda === ESTADO.preguntasSesion[ESTADO.rondaActual].length - 1;
  const esUltimaRonda = ESTADO.rondaActual === 3;

  let textoBoton = "Siguiente pregunta →";
  if(esUltimaDeRonda && !esUltimaRonda) textoBoton = `Finalizar ${RONDA_INFO[ESTADO.rondaActual].nombre.split('·')[0].trim()} →`;
  if(esUltimaDeRonda && esUltimaRonda) textoBoton = "Ver mis resultados →";

  const btnSiguiente = el('button','btn', textoBoton);
  btnSiguiente.id = 'btn-siguiente-pregunta';
  zonaSig.appendChild(btnSiguiente);
  btnSiguiente.addEventListener('click', avanzar);
}

function avanzar(){
  const ronda = ESTADO.rondaActual;
  const esUltimaDeRonda = ESTADO.indiceEnRonda === ESTADO.preguntasSesion[ronda].length - 1;

  if(esUltimaDeRonda){
    if(ronda < 3){
      renderTransicionRonda(ronda + 1, false);
    } else {
      finalizarJuego();
    }
  } else {
    ESTADO.indiceEnRonda += 1;
    renderPregunta();
  }
}

function onContinuarNombre(){
  const val = document.getElementById('input-nombre').value.trim();
  if(!val){ document.getElementById('input-nombre').style.borderColor='var(--incorrecto)'; return; }
  const pais = document.getElementById('select-pais').value;
  if(!pais){
    document.getElementById('select-pais').style.borderColor='var(--incorrecto)';
    return;
  }
  ESTADO.nombre = val;
  ESTADO.pais = pais;
  guardarUltimoNombre(val);
  renderSeleccionIntento();
}

  // ── Bloqueo por deadline: 23:00 hora Centroamérica (UTC-6 = 05:00 UTC del día siguiente) ──
  const ahora = new Date();
  const hoy = ahora.toISOString().slice(0,10);  // "YYYY-MM-DD" UTC
  // 11pm GT = 05:00 UTC del día siguiente → construimos la fecha límite en UTC
  const deadline = new Date(hoy + 'T00:00:00Z');
  deadline.setUTCHours(29, 0, 0, 0); // 24+5 = 05:00 UTC del día siguiente = 23:00 GT
  const bloqueado = ahora >= deadline;

  const cont = $('#pantalla-app');

  const card1 = el('div','intento-card');

  btn1.style.background = '#00a0dd';
  btn1.style.color = '#fff';
  btn1.addEventListener('click', () => iniciarJuego(1));

  const btn2 = el('button','btn chico', yaJugoIntento2 ? 'Mejorar mi marca' : '¡Jugar ahora!');

function obtenerTierMedalla(pct){
  if(pct >= 90) return { id:'oro', etiqueta:'JUGADOR ORO', b64Var: MEDALLA_ORO_B64 };
  if(pct >= 85) return { id:'plata', etiqueta:'JUGADOR PLATA', b64Var: MEDALLA_PLATA_B64 };
  return { id:'bronce', etiqueta:'JUGADOR BRONCE', b64Var: MEDALLA_BRONCE_B64 };
}

let CAMARA_STREAM = null;
let FOTO_CAPTURADA_DATAURL = null;

async function activarCamara(){
  const video = document.getElementById('video-camara');
  const zonaBotones = document.getElementById('zona-botones-camara');
  try{
    CAMARA_STREAM = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    video.srcObject = CAMARA_STREAM;
    video.style.display = 'block';
    zonaBotones.innerHTML = `<button class="btn" id="btn-tomar-foto">📸 Tomar foto</button>`;
    document.getElementById('btn-tomar-foto').addEventListener('click', tomarFoto);
  }catch(err){
    zonaBotones.innerHTML = `<div class="retro-box no"><span class="etiqueta">No se pudo acceder a la cámara</span>Verifica los permisos de cámara en tu navegador, o continúa sin foto.</div>`;
  }
}

function detenerCamara(){
  if(CAMARA_STREAM){
    CAMARA_STREAM.getTracks().forEach(t => t.stop());
    CAMARA_STREAM = null;
  }
}

function tomarFoto(){
  const video = document.getElementById('video-camara');
  const canvas = document.getElementById('canvas-foto');
  const preview = document.getElementById('preview-foto');

  const tam = Math.min(video.videoWidth, video.videoHeight);
  canvas.width = 600; canvas.height = 750; // proporción retrato tipo Panini

  const ctx = canvas.getContext('2d');
  // Recorte centrado tipo "retrato" desde el video cuadrado/horizontal
  const srcW = video.videoWidth, srcH = video.videoHeight;
  const targetRatio = 600/750;
  let cropW = srcH * targetRatio;
  let cropH = srcH;
  if(cropW > srcW){ cropW = srcW; cropH = srcW / targetRatio; }
  const sx = (srcW - cropW)/2;
  const sy = (srcH - cropH)/2;

  // Espejar horizontalmente (efecto selfie natural)
  ctx.translate(canvas.width, 0);
  ctx.scale(-1,1);
  ctx.drawImage(video, sx, sy, cropW, cropH, 0, 0, canvas.width, canvas.height);
  ctx.setTransform(1,0,0,1,0,0);

  FOTO_CAPTURADA_DATAURL = canvas.toDataURL('image/png');

  video.style.display = 'none';
  preview.src = FOTO_CAPTURADA_DATAURL;
  preview.style.display = 'block';
  detenerCamara();

  document.getElementById('zona-botones-camara').innerHTML = `
    <button class="btn secundario" id="btn-repetir-foto">🔄 Repetir foto</button>
    <button class="btn" id="btn-generar-tarjeta">✨ Generar mi tarjeta</button>
  `;
  document.getElementById('btn-repetir-foto').addEventListener('click', () => {
    preview.style.display = 'none';
    document.getElementById('zona-tarjeta-final').innerHTML = '';
    activarCamara();
  });
  document.getElementById('btn-generar-tarjeta').addEventListener('click', generarTarjetaPanini);
}

async function generarTarjetaPanini(){
  const nombre = document.getElementById('input-trofeo-nombre').value.trim() || 'Asesor';
  const apellido = document.getElementById('input-trofeo-apellido').value.trim() || 'Whirlpool';

  if(!FOTO_CAPTURADA_DATAURL){
    alert('Primero toma una foto.');
    return;
  }

  const pct = Math.round((ESTADO.correctas / ESTADO.totalPreguntas) * 100);
  const tier = obtenerTierMedalla(pct);

  const W = 800, H = 1000;
  const canvasFinal = document.createElement('canvas');
  canvasFinal.width = W; canvasFinal.height = H;
  const ctx = canvasFinal.getContext('2d');

  // 1. Fondo dorado Panini
  const fondo = await cargarImagen('data:image/png;base64,' + FONDO_PANINI_B64);
  ctx.drawImage(fondo, 0, 0, W, H);

  // 2. Foto del asesor (rectangular grande, parte superior)
  const foto = await cargarImagen(FOTO_CAPTURADA_DATAURL);
  const fotoX = 60, fotoY = 70, fotoW = W-120, fotoH = 560;
  ctx.save();
  redondearRect(ctx, fotoX, fotoY, fotoW, fotoH, 18);
  ctx.clip();
  dibujarImagenCover(ctx, foto, fotoX, fotoY, fotoW, fotoH);
  ctx.restore();
  ctx.lineWidth = 6;
  ctx.strokeStyle = '#ffffff';
  redondearRect(ctx, fotoX, fotoY, fotoW, fotoH, 18);
  ctx.stroke();

  // 3. Numero "26" decorativo estilo Panini, esquina superior derecha
  ctx.font = "800 64px Inter, sans-serif";
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.textAlign = 'right';
  ctx.fillText('26', W-40, 60);

  // 4. Medalla (esquina inferior derecha de la foto)
  const medalla = await cargarImagen('data:image/png;base64,' + tier.b64Var);
  const medW = 110, medH = 110*(medalla.height/medalla.width);
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.4)';
  ctx.shadowBlur = 10;
  ctx.drawImage(medalla, W-60-medW+0, fotoY+fotoH-medH+20, medW, medH);
  ctx.restore();

  // 5. Logo Whirlpool Academy (esquina inferior izquierda de la foto, fondo oscuro para contraste)
  const logo = await cargarImagen(logoIsotipoDataUrl());
  const logoW = 522, logoH = 522*(logo.height/logo.width);
  const logoX = fotoX+18, logoY = fotoY+fotoH-logoH-18;
  ctx.save();
  redondearRect(ctx, logoX-10, logoY-8, logoW+20, logoH+16, 8);
  ctx.fillStyle = 'rgba(10,10,14,0.78)';
  ctx.fill();
  ctx.drawImage(logo, logoX, logoY, logoW, logoH);
  ctx.restore();

  // 6. Franja de nombre (debajo de la foto, estilo Panini)
  const franjaY = fotoY+fotoH+24;
  ctx.fillStyle = 'rgba(15,17,23,0.92)';
  redondearRect(ctx, fotoX, franjaY, fotoW, 78, 12);
  ctx.fill();
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffffff';
  ctx.font = "800 30px Inter, sans-serif";
  ctx.fillText(`${nombre.toUpperCase()} ${apellido.toUpperCase()}`, W/2, franjaY+34);
  ctx.font = "600 15px Inter, sans-serif";
  ctx.fillStyle = '#f5c428';
  ctx.fillText(`CRACK MUNDIALISTA · DESAFÍO REFRIGERACIÓN`, W/2, franjaY+60);

  // 7. Etiqueta de tier (Jugador Oro/Plata/Bronce) arriba de la franja de nombre
  ctx.font = "800 17px Inter, sans-serif";
  ctx.fillStyle = '#1a1505';
  const tierW = ctx.measureText(tier.etiqueta).width + 40;
  const tierX = fotoX+fotoW-tierW-10, tierY = franjaY-46;
  ctx.fillStyle = '#f5c428';
  redondearRect(ctx, tierX, tierY, tierW, 34, 17);
  ctx.fill();
  ctx.fillStyle = '#1a1505';
  ctx.textAlign = 'center';
  ctx.fillText(tier.etiqueta, tierX+tierW/2, tierY+23);

  // 8. Footer Panini-style: barra de marca Whirlpool
  const colores = ['#c44fb0','#f5c428','#161a4a','#c11f35'];
  const segW = W/colores.length;
  colores.forEach((c,i) => {
    ctx.fillStyle = c;
    ctx.fillRect(i*segW, H-14, segW, 14);
  });

  const dataUrlFinal = canvasFinal.toDataURL('image/png');

  const zona = document.getElementById('zona-tarjeta-final');
  zona.innerHTML = `
    <div style="text-align:center;">
      <img src="${dataUrlFinal}" style="width:100%; max-width:380px; border-radius:14px; box-shadow:0 12px 30px rgba(0,0,0,0.5);">
      <div style="margin-top:16px;">
        <a class="btn" id="btn-descargar-tarjeta" download="tarjeta-crack-mundialista-${nombre}.png" href="${dataUrlFinal}">⬇️ Descargar mi tarjeta</a>
      </div>
    </div>
  `;
}

function redondearRect(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function dibujarImagenCover(ctx, img, x, y, w, h){
  const ratio = Math.max(w/img.width, h/img.height);
  const nw = img.width*ratio, nh = img.height*ratio;
  const nx = x + (w-nw)/2;
  const ny = y + (h-nh)/2;
  ctx.drawImage(img, nx, ny, nw, nh);
}

function cargarImagen(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}
